<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手 AI版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 隐藏滚动条但保留滚动功能 */
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }

        *::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
        }

        /* 动态渐变文字 */
        .animated-gradient-text {
            background: linear-gradient(90deg,
                    #3b82f6 0%,
                    #8b5cf6 25%,
                    #ec4899 50%,
                    #8b5cf6 75%,
                    #3b82f6 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 10s linear infinite;
        }

        @keyframes gradient-flow {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        textarea {
            line-height: 22px;
        }

        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast 样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* 选择框样式 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        /* 动画效果 */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-animate {
            animation: fadeInScale 0.2s ease-out;
        }

        /* Modal 样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.2s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 🌟 新增：呼吸灯红色渐变动画 (用于查重) */
        @keyframes breathing-red {
            0% { border-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
            50% { border-color: #dc2626; box-shadow: 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 10px rgba(239, 68, 68, 0.2); }
            100% { border-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
        }

        /* 🌟 精简动画：仅保留核心反馈 */
        .btn-hover-red:hover {
            background-color: #991b1b !important;
            color: white !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-root"></div>

    <script>
        // 🌟 动态适配后端地址 (支持局域网 IP 访问)
        const BACKEND_BASE_URL = window.location.origin.includes('http') 
            ? `${window.location.origin}/api` 
            : 'http://127.0.0.1:5000/api';

        // Toast 通知
        const toast = {
            success: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast success';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            },
            error: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast error';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            }
        };

        // 确认对话框
        function showConfirmDialog(title, description, onConfirm) {
            const modalRoot = document.getElementById('modal-root');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">${title}</h3>
                    <p style="color: #6b7280; margin-bottom: 24px;">${description}</p>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="cancel-btn" style="padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: white; cursor: pointer;">取消</button>
                        <button id="confirm-btn" style="padding: 8px 16px; border: none; border-radius: 6px; background: #3b82f6; color: white; cursor: pointer;">确认</button>
                    </div>
                </div>
            `;
            modalRoot.appendChild(modal);

            modal.querySelector('#cancel-btn').onclick = () => modal.remove();
            modal.querySelector('#confirm-btn').onclick = () => {
                onConfirm();
                modal.remove();
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        // 🌟 新增：全局模糊匹配工具 (确保下拉框能对上带括号的名字)
        window.findBestMatch = (options, value) => {
            if (!value) return '';
            const clean = (s) => String(s).replace(/[\(\（].*?[\)\）]/g, '').replace(/[\[\]]/g, '').trim().toUpperCase();
            const target = clean(value);
            // 1. 直接匹配
            if (options.includes(value)) return value;
            // 2. 清洁后的精确匹配
            const match = options.find(opt => clean(opt) === target);
            if (match) return match;
            // 3. 包含匹配
            return options.find(opt => clean(opt).includes(target) || target.includes(clean(opt))) || value;
        };

        // SVG 图标
        const icons = {
            checkCircle: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`,
            user: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
            sparkles: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364-.707-.707M6.343 6.343l-.707-.707m12.728 0-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/></svg>`,
            send: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`,
            download: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`,
            trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            trashSmall: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            chevronDown: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            chevronUp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            package: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg>`,
            loader: `<svg class="loader-icon" width="32" height="32" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>`
        };

        // 主应用状态
        let appState = {
            orders: [],
            globalOptions: {
                salesmen: [],
                customers: [],
                payMethods: [],
                receipts: [],
                expressOptions: [],
                allProducts: [],
            },
            isProcessing: false,
            inputText: '',
            mousePosition: { x: 0, y: 0 }
        };

        // 动画角色组件
        function AnimatedCharacters() {
            const container = document.createElement('div');
            container.style.cssText = 'position: relative; width: 480px; height: 360px; margin: 0 auto; perspective: 1000px;';

            // 紫色矩形角色
            const purple = document.createElement('div');
            purple.className = 'character-purple';
            purple.style.cssText = 'position: absolute; bottom: 0; left: 60px; width: 170px; height: 370px; background: #6c3ff5; border-radius: 10px 10px 0 0; z-index: 1; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            purple.innerHTML = `
                <div style="position: absolute; left: 45px; top: 40px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 黑色矩形角色
            const black = document.createElement('div');
            black.className = 'character-black';
            black.style.cssText = 'position: absolute; bottom: 0; left: 220px; width: 115px; height: 290px; background: #2d2d2d; border-radius: 8px 8px 0 0; z-index: 2; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            black.innerHTML = `
                <div style="position: absolute; left: 26px; top: 32px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 橙色半圆角色
            const orange = document.createElement('div');
            orange.className = 'character-orange';
            orange.style.cssText = 'position: absolute; bottom: 0; left: 0; width: 230px; height: 190px; background: #ff9b6b; border-radius: 115px 115px 0 0; z-index: 3; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            orange.innerHTML = `
                <div style="position: absolute; left: 82px; top: 90px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
            `;

            // 黄色圆角色
            const yellow = document.createElement('div');
            yellow.className = 'character-yellow';
            yellow.style.cssText = 'position: absolute; bottom: 0; left: 290px; width: 135px; height: 215px; background: #e8d754; border-radius: 68px 68px 0 0; z-index: 4; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            yellow.innerHTML = `
                <div style="position: absolute; left: 52px; top: 40px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
                <div class="mouth-line" style="position: absolute; left: 54px; top: 88px; width: 40px; height: 4px; background: #2d2d2d; border-radius: 2px; transition: all 0.7s ease-in-out;"></div>
            `;

            container.appendChild(purple);
            container.appendChild(black);
            container.appendChild(orange);
            container.appendChild(yellow);

            // 鼠标跟随动画
            window.addEventListener('mousemove', (e) => {
                const characters = [purple, black, orange, yellow];
                characters.forEach((char) => {
                    const rect = char.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 3;
                    const dx = e.clientX - cx;
                    const dy = e.clientY - cy;
                    const faceX = Math.max(-15, Math.min(15, dx / 20));
                    const faceY = Math.max(-10, Math.min(10, dy / 30));
                    const bodySkew = Math.max(-6, Math.min(6, -dx / 120));

                    char.style.transform = `skewX(${bodySkew}deg)`;

                    const faceContainer = char.querySelector('div[style*="transition"]');
                    const mouthLine = char.querySelector('.mouth-line');
                    if (faceContainer) {
                        const baseLeft = char === purple ? 45 : char === black ? 26 : char === orange ? 82 : 52;
                        const baseTop = char === purple ? 40 : char === black ? 32 : char === orange ? 90 : 40;
                        faceContainer.style.left = `${baseLeft + faceX}px`;
                        faceContainer.style.top = `${baseTop + faceY}px`;
                        
                        // 🌟 如果是黄色小人，让它的横线嘴巴也跟着动 (修正基准点为 54px)
                        if (mouthLine) {
                            mouthLine.style.left = `${54 + faceX * 1.2}px`;
                            mouthLine.style.top = `${88 + faceY * 0.8}px`;
                        }
                    }

                    // 眼珠跟随
                    const pupils = char.querySelectorAll('.pupil');
                    pupils.forEach((pupil) => {
                        const pupilRect = pupil.getBoundingClientRect();
                        const pcx = pupilRect.left + pupilRect.width / 2;
                        const pcy = pupilRect.top + pupilRect.height / 2;
                        const pdx = e.clientX - pcx;
                        const pdy = e.clientY - pcy;
                        const maxDist = char === purple ? 4 : char === black ? 3.5 : 8;
                        const dist = Math.min(Math.sqrt(pdx * pdx + pdy * pdy), maxDist);
                        const angle = Math.atan2(pdy, pdx);
                        pupil.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                    });
                });
            });

            return container;
        }

        // 欢迎屏幕
        function WelcomeScreen() {
            const container = document.createElement('div');
            container.className = 'flex flex-col items-center justify-center px-4';
            container.style.minHeight = 'calc(100vh - 200px)';

            const charactersDiv = document.createElement('div');
            charactersDiv.style.marginBottom = '2rem';
            charactersDiv.appendChild(AnimatedCharacters());

            const textDiv = document.createElement('p');
            textDiv.className = 'text-center max-w-md text-lg font-bold animated-gradient-text';
            textDiv.style.lineHeight = '1.75';
            textDiv.textContent = '粘贴订单文本,AI 自动识别收货信息、货品明细，助您快速完成订单录入';

            container.appendChild(charactersDiv);
            container.appendChild(textDiv);

            return container;
        }

        // 订单卡片
        function OrderCard(order, index, globalOptions, onUpdate, onDelete, isDuplicate = false) {
            const card = document.createElement('div');
            card.className = `bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-4 transition-all hover:shadow-md ${isDuplicate ? 'duplicate-highlight shadow-xl shadow-red-200' : ''}`;
            card.style.height = 'fit-content';

            if (order.loading) {
                card.innerHTML = `
                    <div class="p-8 flex flex-col items-center justify-center">
                        <div class="loader mb-3"></div>
                        <span class="text-sm text-gray-600">AI 正在识别...</span>
                    </div>
                `;
                return card;
            }

            if (order.status === 'error') {
                card.className = 'bg-red-50 rounded-xl p-4 border border-red-100 shadow-sm relative group mb-4';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="bg-red-200 text-red-800 text-[10px] font-bold px-2 py-0.5 rounded">ERROR</span>
                            <h3 class="font-bold text-red-800 text-sm">解析失败</h3>
                        </div>
                        <button onclick="confirmDeleteOrder(${order.id})" class="h-8 w-8 flex items-center justify-center text-red-400 hover:bg-red-800 hover:text-white rounded-full transition-all border border-red-100 bg-white">
                            ${icons.trash}
                        </button>
                    </div>
                    <p class="text-xs text-red-600 font-mono break-all leading-relaxed bg-white/50 p-2 rounded border border-red-50">${order.message || '未知解析错误'}</p>
                `;
                return card;
            }

            // Content
            card.innerHTML = `
                    <div class="flex justify-between items-center -mx-4 -mt-4 mb-4 px-6 py-3 bg-white border-b border-gray-100 rounded-t-xl border-l-[6px] border-l-blue-600 shadow-sm">
                        <div class="flex items-center gap-5">
                            <span class="bg-blue-600 text-white text-xs font-black px-3 py-1 rounded-md shadow-sm">#${index + 1}</span>
                            <h3 class="font-bold text-gray-900 text-lg tracking-tight">${order.receiver || '新订单'}</h3>
                                           <div class="flex flex-col gap-1.5">
                        <!-- 第一排：核心信息 (极致紧凑) -->
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                            <div class="space-y-0.5">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">收货人</label>
                                <input type="text" value="${order.receiver || ''}" onchange="updateOrder(${order.id}, 'receiver', this.value)" class="w-full h-8 text-sm px-2 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white text-gray-800 font-bold" />
                            </div>
                            <div class="space-y-0.5">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">手机号</label>
                                <input type="text" value="${order.phone || ''}" onchange="updateOrder(${order.id}, 'phone', this.value)" class="w-full h-8 text-sm px-2 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white text-gray-800 font-bold" />
                            </div>
                            <div class="space-y-0.5">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">应收合计</label>
                                <input type="number" value="${order.total || 0}" onchange="updateOrder(${order.id}, 'total', this.value)" class="w-full h-8 text-sm px-2 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white font-black text-blue-600 text-center" />
                            </div>
                            <div class="space-y-0.5">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">应收邮费</label>

        // --- 全局交互函数 ---

        window.updateCustomerLink = async (orderId, matchedAccountCode) => {
            const order = appState.orders.find(o => o.id === orderId);
            if (!order) return;

            // 如果原本识别出的账号不等于新选的账号，则触发学习
            if (order.account && order.account !== matchedAccountCode) {
                console.log(`🧠 系统正在同步学习客户关联: ${order.account} -> ${matchedAccountCode}`);
                try {
                    await fetch(`${BACKEND_BASE_URL}/learn`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'customer',
                            rawName: order.account,
                            matchedName: matchedAccountCode
                        })
                    });
                } catch (e) {
                    console.error('学习同步失败:', e);
                }
            }
            updateOrder(orderId, 'account', matchedAccountCode);
        };

        window.updateOrder = (id, field, value) => {
            appState.orders = appState.orders.map(o => {
                if (o.id === id) {
                    let newOrder = { ...o, [field]: value };
                    
                    // 🌟 联动A: 结算方式设为欠款 -> 清空收款人
                    if (field === 'payMethod' && value === '欠款计应收') {
                        newOrder.receipt = '';
                    }
                    // 🌟 联动B: 选了/取消收款人
                    if (field === 'receipt') {
                        if (value !== '') {
                            newOrder.payMethod = '银行收款'; // 选了账户 -> 银行收款
                        } else {
                            newOrder.payMethod = '欠款计应收'; // 清空账户 -> 欠款计应收
                        }
                    }

                    // 🌟 联动C: 快递修改触发学习
                    if (field === 'express' && value) {
                        const key = o.receiver || o.address;
                        if (key && o.express.includes('待定')) {
                            console.log(`🧠 系统正在同步学习快递规则: ${key} -> ${value}`);
                            learnCorrection('express', key, value);
                        }
                    }

                    if (field === 'freight' || field === 'total') {
                        const prodSum = o.products.reduce((sum, p) => sum + (parseFloat(p.price || 0) * parseInt(p.qty || 1)), 0);
                        if (field === 'freight') {
                            newOrder.total = prodSum + parseFloat(value || 0);
                        }
                    }
                    return newOrder;
                }
                return o;
            });
            render();
        };

        window.updateProduct = (orderId, productIndex, field, value) => {
            appState.orders = appState.orders.map(o => {
                if (o.id === orderId) {
                    const products = [...o.products];
                    const p = { ...products[productIndex], [field]: value };

                    // 1. 同步库存元数据
                    if (field === 'matchedName') {
                        const oldMatch = products[productIndex].matchedName;
                        const searchName = p.name || p.searchName;
                        if (appState.globalOptions.allProductsData) {
                            const info = appState.globalOptions.allProductsData.find(s =>
                                String(s['货品名称']).trim() === String(value).trim()
                            );
                            if (info) {
                                p.productInfo = info;
                                // 🌟 关键同步：把查到的原始列信息填进我们的标准字段里
                                p.spec_no = info['规格编号'] || info['货品代码'] || info['编码'] || info['货品编号'] || '';
                                p.item_no = info['货品编号'] || info['货品代码'] || info['商品编号'] || '';
                                p.barcode = info['条码'] || info['货品条码'] || info['商品条码'] || '';
                                p.spec = info['规格'] || info['货品规格'] || info['型号规格'] || '';
                            }
                        }
                        if (value && value !== oldMatch && searchName) {
                            learnCorrection('product', searchName, value, o.account); 
                        }
                    }

                    products[productIndex] = p;
                    const newOrder = { ...o, products };

                    // 🌟 核心逻辑：如果修改的是价格或数量，则自动更新合计
                    if (field === 'price' || field === 'qty' || field === 'matchedName') {
                        const prodSum = products.reduce((sum, item) => sum + (parseFloat(item.price || 0) * parseInt(item.qty || 1)), 0);
                        newOrder.total = prodSum + parseFloat(o.freight || 0);
                    }

                    return newOrder;
                }
                return o;
            });
            render();
        };

        async function learnCorrection(type, rawName, matchedName, customer) {
            try {
                await fetch(`${BACKEND_BASE_URL}/learn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, rawName, matchedName, customer })
                });
                console.log(`💡 系统进步 [${type}]：记录了 ${rawName} -> ${matchedName} (客户: ${customer || '未知'})`);
                fetchOptions();
            } catch (e) { console.error('Learning Failed', e); }
        }

                '确认删除此订单？',
                '删除后无法恢复，请确认是否继续。',

                    appState.orders = appState.orders.filter(o => o.id !== id);
                    render();
                    toast.success('订单已删除');

            );

        window.toggleProducts = (orderId) => {
            const productsDiv = document.getElementById(`products-${orderId}`);

        // 获取配置
        async function fetchOptions() {
            try {
                const res = await fetch(`${BACKEND_BASE_URL}/options`);
                if (res.ok) {
                    appState.globalOptions = await res.json();
                    console.log('✅ 系统配置与库存加载成功');
                }
            } catch (e) {
                console.error('Options Failed', e);
                toast.error('无法连接到后端服务', '请确保后端已启动在 http://127.0.0.1:5000');
            }
        }

        // 提交订单文本 (非阻塞异步模式)
        async function handleSubmitText(text) {
            const rawText = text.trim();
            if (!rawText) return;

            // 1. 立即清空输入框，准备下一单
            appState.inputText = '';
            render();

            let chunks = rawText.split(/\n\s*\n/).map(t => t.trim()).filter(t => t.length > 5);
            if (chunks.length === 0) chunks = [rawText];

            const newOrders = chunks.map(chunk => {
                const uniqueId = Date.now() + Math.random();
                return {
                    id: uniqueId,
                    raw: chunk,
                    receiver: '⏳ 正在拼命识别...',
                    products: [],
                    loading: true,
                    error: false,
                    errType: '',
                    phone: '',
                    address: '',
                    total: 0,
                    freight: 0,
                    account: '',
                    salesman: appState.globalOptions.salesmen[0] || '',
                    receipt: appState.globalOptions.receipts[0] || '',
                    express: '',
                    note: '',
                };
            });

            // 2. 把占位符按序追加到列表末尾
            appState.orders = [...appState.orders, ...newOrders];
            render();

            // 3. 并发解析每一单
            newOrders.forEach(async (placeholder, idx) => {
                try {
                    const resp = await fetch(`${BACKEND_BASE_URL}/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: placeholder.raw }),
                    });

                    if (resp.ok) {
                        const parsed = await resp.json();
                        console.log('🌟 [100% 原始数据到达]:', parsed);
                        
                        // 🌟 强力更新：不仅合并，还要确保关键字段不被默认值覆盖
                        appState.orders = appState.orders.map(o => {
                            if (o.id === placeholder.id) {
                                return { 
                                    ...o, 
                                    ...parsed, 
                                    loading: false, 
                                    error: false,
                                    receiver: parsed.receiver || '未知名字' 
                                };
                            }
                            return o;
                        });
                    } else {
                        throw new Error(`HTTP ${resp.status}`);
                    }
                } catch (e) {
                    appState.orders = appState.orders.map(o =>
                        o.id === placeholder.id ? { ...o, error: true, loading: false, errType: e.message, status: 'error', message: '前端处理异常: ' + e.message } : o
                    );
                } finally {
                    render();
                }
            });
        }

        // 下载Excel
        function exportToExcel() {
            if (appState.orders.length === 0) {
                toast.error('没有订单可以下载');
                return;
            }

            const wb = XLSX.utils.book_new();
            const orderRows = [['导入编号', '收货人', '手机', '收货地址', '收货人信息(解析)', '应收邮资', '应收合计', '客服备注', '客户账号', '销售渠道名称', '结算方式', '物流公司', '物流单号', '支付单号', '收款账户', '业务员']];
            const prodRows = [['导入编号(关联订单)', '货品名称', '条码', '货品编号', '规格', '数量', '单价']];

            appState.orders.forEach((r, idx) => {
                const importId = r.phone || (idx + 1); // 🌟 优先使用手机号作为导入编号
                orderRows.push([
                    importId, r.receiver, r.phone, r.address,
                    `${r.receiver} ${r.phone} ${r.address}`,
                    r.freight || 0, r.total || 0, r.note || '',
                    r.account || '', r.salesChannel || '仝心科技线下批发',
                    r.payMethod || '欠款计应收', r.express || '',
                    '', '', // 物流单号, 支付单号 (留空)
                    r.receipt || '', r.salesman || ''
                ]);
                (r.products || []).forEach(p => {
                    prodRows.push([
                        importId,
                        p.matchedName || p.searchName,
                        p.productInfo?.['条码'] || '',
                        p.productInfo?.['货品编号'] || '',
                        p.productInfo?.['规格'] || '',
                        p.qty, p.price
                    ]);
                });
            });

            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orderRows), '订单');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prodRows), '货品');
            const dataStr = new Date().toLocaleDateString().replace(/\//g, '_');
            XLSX.writeFile(wb, `订单分表_${dataStr}_共${appState.orders.length}单.xlsx`);

            toast.success('订单已下载为Excel文件');
        }

                    <div class="flex items-center gap-4">
                        ${appState.orders.length > 0 ? `
                            <button onclick="clearAllOrders()" class="h-8 px-4 text-sm rounded-full text-red-700 bg-red-50 hover:bg-red-800 hover:text-white border border-red-200 flex items-center gap-1.5 transition-all active:scale-95">
                                ${icons.trash}
                                清空列表
                            </button>
                            <button onclick="exportToExcel()" class="h-8 px-4 text-sm rounded-full text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 flex items-center gap-1.5 shadow-sm shadow-emerald-100 transition-all active:scale-95">
                                ${icons.download}
                                下载表格
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            // Content
            const content = document.createElement('div');
            content.className = 'flex-1 overflow-y-auto';
            content.style.height = 'calc(100vh - 56px - 120px)';

            const contentInner = document.createElement('div');
            contentInner.className = 'max-w-[1800px] mx-auto px-4 py-6';

            if (appState.orders.length === 0) {
                contentInner.appendChild(WelcomeScreen());
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-4';
                appState.orders.forEach((order, index) => {
                    const isDuplicate = order.phone && phoneCounts[String(order.phone).trim()] > 1;
                    grid.appendChild(OrderCard(order, index, appState.globalOptions, updateOrder, confirmDeleteOrder, isDuplicate));
                });
                contentInner.appendChild(grid);
            }

            content.appendChild(contentInner);

            // Input
            const inputSection = document.createElement('div');
            inputSection.className = 'border-t border-gray-200 bg-white sticky bottom-0';
            inputSection.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-4">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 relative">
                            <textarea
                                id="input-textarea"
                                placeholder="粘贴订单文本，自动识别..."
                                class="w-full min-h-[52px] max-h-[200px] resize-none rounded-2xl border border-gray-300 px-4 py-[15px] text-[15px] focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                ${appState.isProcessing ? 'disabled' : ''}
                                rows="1"
                            >${appState.inputText}</textarea>
                        </div>
                        <button
                            id="submit-btn"
                            ${!appState.inputText.trim() || appState.isProcessing ? 'disabled' : ''}
                            class="h-[52px] w-[52px] rounded-full flex items-center justify-center text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 shadow-lg shadow-emerald-100 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ${appState.isProcessing ? '<div class="loader" style="width: 20px; height: 20px; border-width: 2px;"></div>' : icons.send}
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-center">
                        粘贴自动识别 · Enter 发送 · Shift + Enter 换行
                    </p>
                </div>
            `;

            root.appendChild(header);
            root.appendChild(content);
            root.appendChild(inputSection);

            // 事件监听
            const textarea = document.getElementById('input-textarea');
            const submitBtn = document.getElementById('submit-btn');

            textarea.addEventListener('input', (e) => {
                appState.inputText = e.target.value;
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
                submitBtn.disabled = !appState.inputText.trim() || appState.isProcessing;
            });

            textarea.addEventListener('paste', (e) => {
                const pastedText = e.clipboardData.getData('text');
                if (pastedText.trim()) {
                    e.preventDefault();
                    handleSubmitText(pastedText);
                }
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (appState.inputText.trim() && !appState.isProcessing) {
                        handleSubmitText(appState.inputText);
                    }
                }
            });

            submitBtn.addEventListener('click', () => {
                if (appState.inputText.trim() && !appState.isProcessing) {
                    handleSubmitText(appState.inputText);
                }
            });
        }

        // 初始化
        fetchOptions();
        render();
    </script>
</body>

</html>
