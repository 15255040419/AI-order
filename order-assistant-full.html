<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手 AI版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 隐藏滚动条但保留滚动功能 */
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }

        *::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
            font-size: 13px;
        }

        /* 动态渐变文字 */
        .animated-gradient-text {
            background: linear-gradient(90deg,
                    #3b82f6 0%,
                    #8b5cf6 25%,
                    #ec4899 50%,
                    #8b5cf6 75%,
                    #3b82f6 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 10s linear infinite;
        }

        @keyframes gradient-flow {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        textarea {
            line-height: 22px;
        }

        .loader {
            width: 32px;
            height: 32px;
            border: 2px solid color-mix(in srgb, var(--cc-border) 70%, transparent);
            border-top-color: var(--cc-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast 样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* 选择框样式 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        /* 动画效果 */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-animate {
            animation: fadeInScale 0.2s ease-out;
        }

        /* Modal 样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.2s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 🌟 新增：呼吸灯红色渐变动画 (用于查重) */
        @keyframes breathing-red {
            0% {
                border-color: #ef4444;
                box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
            }

            50% {
                border-color: #dc2626;
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 10px rgba(239, 68, 68, 0.2);
            }

            100% {
                border-color: #ef4444;
                box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
            }
        }

        .duplicate-highlight {
            border-color: #ef4444 !important;
            animation: breathing-red 1.6s ease-in-out infinite;
        }

        .duplicate-highlight .cc-card-head {
            background: color-mix(in srgb, #ef4444 12%, var(--cc-surface-2)) !important;
        }

        .duplicate-highlight .cc-card-head::after {
            content: "重复订单";
            margin-left: auto;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, #ef4444 55%, transparent);
            color: #ef4444;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.4;
        }

        /* 🌟 精简动画：仅保留核心反馈 */
        .btn-hover-red:hover {
            background-color: #991b1b !important;
            color: white !important;
        }

        :root {
            --cc-bg: #f7f7f4;
            --cc-surface: #ffffff;
            --cc-surface-2: #f0f0ea;
            --cc-surface-3: #e8e6dc;
            --cc-border: #d9d6c8;
            --cc-border-soft: #ebe8de;
            --cc-text: #1f211c;
            --cc-muted: #747064;
            --cc-faint: #9b9688;
            --cc-accent: #d97706;
            --cc-accent-2: #0f766e;
            --cc-danger: #b91c1c;
            --cc-warning-bg: #fff7d6;
            --cc-warning-border: #f2d16b;
            --cc-shadow: 0 16px 40px rgba(31, 33, 28, 0.08);
            --cc-mono: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --cc-bg: #171814;
            --cc-surface: #20211d;
            --cc-surface-2: #282923;
            --cc-surface-3: #303128;
            --cc-border: #3d3c32;
            --cc-border-soft: #2e2f28;
            --cc-text: #f1efe3;
            --cc-muted: #b4ae9d;
            --cc-faint: #847f70;
            --cc-accent: #f2a93b;
            --cc-accent-2: #51c5b3;
            --cc-danger: #fb7185;
            --cc-warning-bg: #3a321d;
            --cc-warning-border: #7c6322;
            --cc-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
        }

        html[data-theme="light"] {
            color-scheme: light;
        }

        body {
            background: var(--cc-bg) !important;
            color: var(--cc-text);
            --mouse-x: 50vw;
            --mouse-y: 50vh;
        }

        .cc-shell {
            position: relative;
            min-height: 100vh;
            background:
                linear-gradient(180deg, color-mix(in srgb, var(--cc-accent) 8%, transparent), transparent 260px),
                var(--cc-bg);
        }

        .cc-shell::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(300px circle at var(--mouse-x) var(--mouse-y),
                    color-mix(in srgb, var(--cc-accent) 9%, transparent),
                    transparent 58%);
            opacity: 0.42;
            transition: opacity 0.2s ease;
        }

        .cc-shell > * {
            position: relative;
            z-index: 1;
        }

        .cc-header {
            border-bottom: 1px solid var(--cc-border);
            background: color-mix(in srgb, var(--cc-surface) 88%, transparent);
            backdrop-filter: blur(18px);
        }

        .cc-logo {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            border: 1px solid var(--cc-border);
            background: color-mix(in srgb, var(--cc-surface-2) 86%, transparent);
            color: var(--cc-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--cc-mono);
            font-size: 15px;
            font-weight: 750;
            box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 10%, transparent);
        }

        .cc-title {
            color: var(--cc-text);
            letter-spacing: 0;
        }

        .cc-subtitle,
        .cc-muted {
            color: var(--cc-muted);
        }

        .cc-chip {
            height: 32px;
            padding: 0 11px;
            border: 1px solid var(--cc-border);
            border-radius: 9px;
            background: color-mix(in srgb, var(--cc-surface) 86%, var(--cc-bg));
            color: var(--cc-text);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-weight: 680;
            font-family: inherit;
            box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 8%, transparent);
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, color 0.15s ease;
        }

        .cc-chip:hover {
            background: var(--cc-surface-3);
            border-color: color-mix(in srgb, var(--cc-accent) 45%, var(--cc-border));
            transform: translateY(-1px);
        }

        .cc-chip-danger {
            color: var(--cc-danger);
        }

        .cc-chip-primary {
            background: color-mix(in srgb, var(--cc-accent) 16%, var(--cc-surface));
            color: var(--cc-text);
            border-color: color-mix(in srgb, var(--cc-accent) 42%, var(--cc-border));
        }

        .cc-card {
            position: relative;
            background: var(--cc-surface) !important;
            border: 1px solid var(--cc-border) !important;
            border-radius: 10px !important;
            box-shadow: var(--cc-shadow);
            color: var(--cc-text);
            overflow: hidden;
        }

        .cc-card::before {
            display: none;
        }

        .cc-card:hover {
            border-color: color-mix(in srgb, var(--cc-accent) 28%, var(--cc-border)) !important;
        }

        .cc-card-enter {
            animation: card-type-in 0.42s ease both;
        }

        @keyframes card-type-in {
            from {
                opacity: 0;
                transform: translateY(8px);
                clip-path: inset(0 0 100% 0);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                clip-path: inset(0 0 0 0);
            }
        }

        .cc-card-head {
            background: var(--cc-surface-2);
            border-bottom: 1px solid var(--cc-border);
        }

        .cc-input-area {
            border-top: 1px solid var(--cc-border);
            background: color-mix(in srgb, var(--cc-surface) 94%, transparent);
            backdrop-filter: blur(18px);
        }

        .cc-composer {
            background: var(--cc-surface);
            border: 1px solid var(--cc-border);
            border-radius: 10px;
            box-shadow: var(--cc-shadow);
        }

        .cc-send {
            background: color-mix(in srgb, var(--cc-accent) 18%, var(--cc-surface));
            color: var(--cc-text);
            border: 1px solid color-mix(in srgb, var(--cc-accent) 40%, var(--cc-border));
            border-radius: 9px;
            font-size: 14px;
            font-weight: 780;
            box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 10%, transparent);
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .cc-send:hover {
            background: color-mix(in srgb, var(--cc-accent) 28%, var(--cc-surface));
            border-color: color-mix(in srgb, var(--cc-accent) 58%, var(--cc-border));
            transform: translateY(-1px);
        }

        .cc-loading-card {
            min-height: 162px;
            padding: 18px;
        }

        .cc-type-line {
            position: relative;
            display: block;
            width: fit-content;
            max-width: 100%;
            overflow: hidden;
            white-space: nowrap;
            font-family: var(--cc-mono);
            color: var(--cc-muted);
            border-right: 2px solid var(--cc-accent);
            animation: type-line 1.8s steps(28, end) infinite, caret-blink 0.8s steps(2, start) infinite;
        }

        .cc-scan-row {
            height: 9px;
            border-radius: 999px;
            background: linear-gradient(90deg,
                    var(--cc-surface-2),
                    color-mix(in srgb, var(--cc-accent) 28%, var(--cc-surface-2)),
                    var(--cc-surface-2));
            background-size: 220% 100%;
            animation: scan-row 1.25s ease-in-out infinite;
        }

        .cc-scan-row:nth-child(2) {
            width: 72%;
            animation-delay: 0.12s;
        }

        .cc-scan-row:nth-child(3) {
            width: 88%;
            animation-delay: 0.24s;
        }

        @keyframes type-line {
            0% { max-width: 0; }
            52%, 100% { max-width: 28ch; }
        }

        @keyframes caret-blink {
            to { border-color: transparent; }
        }

        @keyframes scan-row {
            from { background-position: 100% 0; }
            to { background-position: -120% 0; }
        }

        .cc-welcome {
            max-width: 880px;
            margin: 0 auto;
            padding: 48px 18px;
        }

        .cc-terminal {
            background: var(--cc-surface);
            border: 1px solid var(--cc-border);
            border-radius: 10px;
            box-shadow: var(--cc-shadow);
            overflow: hidden;
        }

        .cc-terminal-bar {
            background: var(--cc-surface-2);
            border-bottom: 1px solid var(--cc-border);
            padding: 10px 14px;
            font-family: var(--cc-mono);
            color: var(--cc-muted);
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .cc-terminal-body {
            padding: 20px;
            font-family: var(--cc-mono);
            font-size: 13px;
            line-height: 1.8;
        }

        .cc-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--cc-accent);
            vertical-align: -3px;
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        input,
        textarea,
        select {
            background-color: var(--cc-surface) !important;
            color: var(--cc-text) !important;
            border-color: var(--cc-border) !important;
            border-radius: 7px !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--cc-accent) !important;
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--cc-accent) 20%, transparent) !important;
        }

        label,
        th {
            color: var(--cc-muted) !important;
        }

        .bg-white,
        .bg-gray-50,
        .bg-blue-50\/70,
        .bg-blue-50\/50,
        .bg-gray-50\/50,
        .bg-gray-50\/30 {
            background-color: var(--cc-surface) !important;
        }

        .border-gray-100,
        .border-gray-200,
        .border-blue-100,
        .border-dashed {
            border-color: var(--cc-border-soft) !important;
        }

        .text-gray-900,
        .text-gray-800,
        .text-gray-700,
        .text-blue-800,
        .text-blue-600 {
            color: var(--cc-text) !important;
        }

        .text-gray-600,
        .text-gray-500,
        .text-gray-400 {
            color: var(--cc-muted) !important;
        }

        table thead {
            background: var(--cc-surface-2) !important;
        }

        table tbody {
            background: var(--cc-surface) !important;
        }

        .toast,
        .modal-content {
            background: var(--cc-surface) !important;
            border-color: var(--cc-border) !important;
            color: var(--cc-text);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.62);
        }

        .search-item:hover {
            background: var(--cc-surface-2) !important;
        }

        .cc-review {
            background: var(--cc-warning-bg) !important;
            border-color: var(--cc-warning-border) !important;
        }

        .cc-select {
            position: relative;
        }

        .cc-select-button {
            width: 100%;
            height: 32px;
            border: 1px solid var(--cc-border);
            border-radius: 7px;
            background: var(--cc-surface);
            color: var(--cc-text);
            padding: 0 28px 0 9px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .cc-select-button::after {
            content: "";
            position: absolute;
            right: 10px;
            top: 50%;
            width: 7px;
            height: 7px;
            border-right: 1.8px solid var(--cc-muted);
            border-bottom: 1.8px solid var(--cc-muted);
            transform: translateY(-65%) rotate(45deg);
            pointer-events: none;
        }

        .cc-select-menu {
            position: absolute;
            z-index: 100;
            left: 0;
            right: 0;
            top: calc(100% + 6px);
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid var(--cc-border);
            border-radius: 9px;
            background: var(--cc-surface);
            box-shadow: var(--cc-shadow);
            padding: 5px;
        }

        .cc-select-option {
            min-height: 30px;
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--cc-text);
            font-size: 13px;
            font-weight: 650;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .cc-select-option:hover,
        .cc-select-option.active {
            background: var(--cc-surface-2);
        }

        .cc-select-option.active::after {
            content: "✓";
            color: var(--cc-accent);
            font-weight: 900;
        }

        .bg-gradient-to-r,
        .bg-gradient-to-br {
            background-image: none !important;
        }

        .shadow-lg,
        .shadow-sm,
        .shadow-md,
        .shadow-xl {
            box-shadow: none !important;
        }

        .hover\:bg-blue-100:hover,
        .hover\:bg-blue-50:hover,
        .hover\:bg-gray-50\/50:hover {
            background-color: var(--cc-surface-2) !important;
        }

        html[data-theme="dark"] select {
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23b4ae9d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
        }

        .note-textarea {
            min-height: 40px;
            height: 40px;
            line-height: 22px;
            padding-top: 9px !important;
            padding-bottom: 9px !important;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-root"></div>

    <script>
        // 🌟 智能适配后端地址：锁定 5005 端口（避开后台僵尸进程）
        const BACKEND_BASE_URL = (() => {
            // 🌟 核心改进：如果是通过 http/https 协议访问的（不管是 IP 还是 域名），直接使用当前源
            // 这能完美解决多网卡（127.0.0.1 vs 10.20.0.1）导致的连接失败问题
            if (window.location.protocol.startsWith('http')) {
                return `${window.location.origin}/api`;
            }
            // 如果是直接打开本地 .html 文件，则回退到 127.0.0.1
            return 'http://127.0.0.1:5005/api';
        })();

        // Toast 通知
        const toast = {
            success: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast success';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            },
            error: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast error';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            }
        };

        // 确认对话框
        function showConfirmDialog(title, description, onConfirm) {
            const modalRoot = document.getElementById('modal-root');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">${title}</h3>
                    <p style="color: #6b7280; margin-bottom: 24px;">${description}</p>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="cancel-btn" class="cc-chip" style="height: 40px; min-width: 88px; justify-content: center; cursor: pointer;">取消</button>
                        <button id="confirm-btn" class="cc-chip cc-chip-primary" style="height: 40px; min-width: 88px; justify-content: center; cursor: pointer;">确认</button>
                    </div>
                </div>
            `;
            modalRoot.appendChild(modal);

            modal.querySelector('#cancel-btn').onclick = () => modal.remove();
            modal.querySelector('#confirm-btn').onclick = () => {
                onConfirm();
                modal.remove();
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        // 🌟 新增：全局模糊匹配工具 (确保下拉框能对上带括号的名字)
        window.findBestMatch = (options, value) => {
            if (!value) return '';
            const clean = (s) => String(s).replace(/[\(\（].*?[\)\）]/g, '').replace(/[\[\]]/g, '').trim().toUpperCase();
            const target = clean(value);
            // 1. 直接匹配
            if (options.includes(value)) return value;
            // 2. 清洁后的精确匹配
            const match = options.find(opt => clean(opt) === target);
            if (match) return match;
            // 3. 包含匹配

            const yellow = document.createElement('div');
            yellow.className = 'character-yellow';
            yellow.style.cssText = 'position: absolute; bottom: 0; left: 290px; width: 135px; height: 215px; background: #e8d754; border-radius: 68px 68px 0 0; z-index: 4; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            yellow.innerHTML = `

                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>

                <div class="mouth-line" style="position: absolute; left: 54px; top: 88px; width: 40px; height: 4px; background: #2d2d2d; border-radius: 2px; transition: all 0.7s ease-in-out;"></div>
            `;

            container.appendChild(purple);
            container.appendChild(black);
            container.appendChild(orange);
            container.appendChild(yellow);

            // 鼠标跟随动画
            window.addEventListener('mousemove', (e) => {
                const characters = [purple, black, orange, yellow];
                characters.forEach((char) => {
                    const rect = char.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 3;
                    const dx = e.clientX - cx;
                    const dy = e.clientY - cy;
                    const faceX = Math.max(-15, Math.min(15, dx / 20));
                    const faceY = Math.max(-10, Math.min(10, dy / 30));
                    const bodySkew = Math.max(-6, Math.min(6, -dx / 120));

                    char.style.transform = `skewX(${bodySkew}deg)`;

                    const faceContainer = char.querySelector('div[style*="transition"]');
                    const mouthLine = char.querySelector('.mouth-line');
                    if (faceContainer) {
                        const baseLeft = char === purple ? 45 : char === black ? 26 : char === orange ? 82 : 52;
                        const baseTop = char === purple ? 40 : char === black ? 32 : char === orange ? 90 : 40;
                        faceContainer.style.left = `${baseLeft + faceX}px`;
                        faceContainer.style.top = `${baseTop + faceY}px`;

                        // 🌟 如果是黄色小人，让它的横线嘴巴也跟着动 (修正基准点为 54px)
                        if (mouthLine) {
                            mouthLine.style.left = `${54 + faceX * 1.2}px`;
                            mouthLine.style.top = `${88 + faceY * 0.8}px`;
                        }
                    }

                    // 眼珠跟随
                    const pupils = char.querySelectorAll('.pupil');
                    pupils.forEach((pupil) => {
                        const pupilRect = pupil.getBoundingClientRect();
                        const pcx = pupilRect.left + pupilRect.width / 2;
                        const pcy = pupilRect.top + pupilRect.height / 2;
                        const pdx = e.clientX - pcx;
                        const pdy = e.clientY - pcy;
                        const maxDist = char === purple ? 4 : char === black ? 3.5 : 8;
                        const dist = Math.min(Math.sqrt(pdx * pdx + pdy * pdy), maxDist);
                        const angle = Math.atan2(pdy, pdx);
                        pupil.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                    });
                });
            });

            return container;
        }

        function handleStreamEvent(placeholder, eventName, payload) {
            if (eventName === 'progress') {
                updatePlaceholderOrder(placeholder.id, {
                    progressText: payload.message || '正在识别...',
                    progressStep: payload.step || ''
                });
                return false;
            }

            if (eventName === 'done') {
                applyParsedOrder(placeholder.id, payload);
                return true;
            }

            if (eventName === 'error') {
                throw new Error(payload.message || '流式解析失败');
            }
            return false;
        }

        async function parseOrderWithStream(placeholder) {
            let streamStarted = false;
            try {
                const resp = await fetch(`${BACKEND_BASE_URL}/parse-stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: placeholder.raw }),
                });
                if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

                streamStarted = true;
                const reader = resp.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';
                let doneReceived = false;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    const chunks = buffer.split('\n\n');
                    buffer = chunks.pop() || '';
                    for (const chunk of chunks) {
                        const eventLine = chunk.split('\n').find(line => line.startsWith('event:'));
                        const dataLine = chunk.split('\n').find(line => line.startsWith('data:'));
                        if (!dataLine) continue;
                        const eventName = eventLine ? eventLine.replace(/^event:\s*/, '').trim() : 'message';
                        const payload = JSON.parse(dataLine.replace(/^data:\s*/, ''));
                        if (handleStreamEvent(placeholder, eventName, payload)) {
                            doneReceived = true;
                        }
                    }
                }

                if (!doneReceived) throw new Error('流式解析未返回完成结果');
            } catch (e) {
                if (streamStarted) throw e;
                console.warn('流式解析不可用，自动回退普通解析:', e);
                updatePlaceholderOrder(placeholder.id, {
                    progressText: '流式连接失败，切换普通解析...',
                    progressStep: 'fallback'
                });
                await parseOrderPlain(placeholder);
            }
        }

            appState.inputText = '';
            syncComposerFromState();


            let chunks = rawText.split(/\n\s*\n/).map(t => t.trim()).filter(t => t.length > 5);
            if (chunks.length === 0) chunks = [rawText];

            const newOrders = chunks.map(chunk => {
                const uniqueId = Date.now() + Math.random();
                return {
                    id: uniqueId,
                    raw: chunk,
                    receiver: '⏳ 正在拼命识别...',
                    products: [],
                    loading: true,
                    error: false,
                    errType: '',

                    total: 0,

                    salesman: appState.globalOptions.salesmen[0] || '',
                    receipt: appState.globalOptions.receipts[0] || '',
                    express: '',
                    note: '',
                    progressText: '订单已进入解析队列',
                    progressStep: 'queued',
                };
            });

            // 2. 把占位符按序追加到列表末尾
            const startIndex = appState.orders.length;
            appState.orders = [...appState.orders, ...newOrders];
            appendNewOrderCards(startIndex, newOrders);

            // 3. 并发解析每一单
            newOrders.forEach(async (placeholder, idx) => {
                try {
                    await parseOrderWithStream(placeholder);
                } catch (e) {
                    appState.orders = appState.orders.map(o =>
                        o.id === placeholder.id ? { ...o, error: true, loading: false, errType: e.message, status: 'error', message: '前端处理异常: ' + e.message } : o
                    );
                } finally {
                    scheduleRelatedOrderCardRefresh(placeholder.id);
                }
            });
        }

            const prodRows = [['导入编号(关联订单)', '货品名称', '条码', '货品编号', '规格', '数量', '单价']];

            appState.orders.forEach((r, idx) => {
                const importId = r.phone || (idx + 1); // 🌟 优先使用手机号作为导入编号
                orderRows.push([
                    importId, r.receiver, r.phone, r.address,
                    `${r.receiver} ${r.phone} ${r.address}`,
                    r.freight || 0, r.total || 0, r.note || '',
                    r.account || '', r.salesChannel || '仝心科技线下批发',
                    r.payMethod || '欠款计应收', r.express || '',
                    '', '', // 物流单号, 支付单号 (留空)
                    r.receipt || '', r.salesman || ''
                ]);
                (r.products || []).forEach(p => {
                    prodRows.push([
                        importId,
                        p.matchedName || p.searchName,
                        p.productInfo?.['条码'] || p.productInfo?.['货品条码'] || p.barcode || '',
                        p.productInfo?.['货品编号'] || p.item_no || '',
                        p.productInfo?.['规格'] || p.spec || '',
                        p.qty, p.price
                    ]);
                });
            });

            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orderRows), '订单');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prodRows), '货品');
            const dataStr = new Date().toLocaleDateString().replace(/\//g, '_');
            XLSX.writeFile(wb, `订单分表_${dataStr}_共${appState.orders.length}单.xlsx`);

            toast.success('订单已下载为Excel文件');
        }

        // 清空所有订单
        function clearAllOrders() {
            showConfirmDialog(
                '确认清空所有订单？',
                '此操作将删除所有已识别的订单，且无法撤销。请确保已下载重要数据。',
                () => {
                    appState.orders = [];
                    renderKeepScroll();
                    toast.success('已清空所有订单');
                }
            );
        }

        function getOrdersScrollSnapshot() {
            const scroller = document.getElementById('orders-scroll');
            if (!scroller) return null;
            return {
                top: scroller.scrollTop,
                left: scroller.scrollLeft
            };
        }

        function restoreOrdersScrollSnapshot(snapshot) {
            if (!snapshot) return;
            requestAnimationFrame(() => {
                const scroller = document.getElementById('orders-scroll');
                if (!scroller) return;
                scroller.scrollTop = snapshot.top;
                scroller.scrollLeft = snapshot.left;
            });
        }

        function renderKeepScroll() {
            const snapshot = getOrdersScrollSnapshot();
            render();
            restoreOrdersScrollSnapshot(snapshot);
        }

        function scrollOrdersToBottom() {
            requestAnimationFrame(() => {
                const scroller = document.getElementById('orders-scroll');
                if (!scroller) return;
                scroller.scrollTop = scroller.scrollHeight;
            });
        }

        function renderScrollBottom() {
            render();
            scrollOrdersToBottom();
        }

        function updateHeaderSummary() {
            const label = document.getElementById('order-count-label');
            if (!label) return;
            label.textContent = appState.orders.length > 0 ? `${appState.orders.length} 个订单` : 'rules-engine / exact-match';
        }

        function syncComposerFromState() {
            const textarea = document.getElementById('input-textarea');
            const submitBtn = document.getElementById('submit-btn');
            if (textarea) {
                textarea.value = appState.inputText;
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight || 44, 200) + 'px';
            }
            if (submitBtn) {
                submitBtn.disabled = !appState.inputText.trim() || appState.isProcessing;
            }
        }

        function getPhoneCounts() {
            const phoneCounts = {};
            appState.orders.forEach(o => {
                const p = String(o.phone || '').trim();
                if (p) phoneCounts[p] = (phoneCounts[p] || 0) + 1;
            });
            return phoneCounts;
        }

        function replaceOrderCard(orderId) {
            const grid = document.getElementById('orders-grid');
            if (!grid) {
                renderKeepScroll();
                return;
            }

            const index = appState.orders.findIndex(o => String(o.id) === String(orderId));
            if (index < 0) return;

            const order = appState.orders[index];
            const phoneCounts = getPhoneCounts();
            const isDuplicate = order.phone && phoneCounts[String(order.phone).trim()] > 1;
            const nextCard = OrderCard(order, index, appState.globalOptions, updateOrder, confirmDeleteOrder, isDuplicate, false);
            const oldCard = grid.querySelector(`[data-order-id="${String(orderId)}"]`);

            if (oldCard) {
                oldCard.replaceWith(nextCard);
            } else {
                grid.appendChild(nextCard);
            }

            nextCard.querySelectorAll('.note-textarea').forEach(autoResizeNote);
        }

        let pendingOrderCardIds = new Set();
        let pendingCardFrame = null;
        function scheduleOrderCardRefresh(orderId) {
            pendingOrderCardIds.add(orderId);
            if (pendingCardFrame) return;
            pendingCardFrame = requestAnimationFrame(() => {
                const ids = Array.from(pendingOrderCardIds);
                pendingOrderCardIds.clear();
                pendingCardFrame = null;
                ids.forEach(replaceOrderCard);
            });
        }

        function scheduleRelatedOrderCardRefresh(orderId) {
            const order = appState.orders.find(o => String(o.id) === String(orderId));
            const phone = String(order?.phone || '').trim();
            if (!phone) {
                scheduleOrderCardRefresh(orderId);
                return;
            }
            appState.orders
                .filter(o => String(o.phone || '').trim() === phone)
                .forEach(o => scheduleOrderCardRefresh(o.id));
        }

        function appendNewOrderCards(startIndex, newOrders) {
            const grid = document.getElementById('orders-grid');
            if (!grid) {
                renderScrollBottom();
                return;
            }
            const phoneCounts = getPhoneCounts();
            newOrders.forEach((order, offset) => {
                const isDuplicate = order.phone && phoneCounts[String(order.phone).trim()] > 1;
                grid.appendChild(OrderCard(order, startIndex + offset, appState.globalOptions, updateOrder, confirmDeleteOrder, isDuplicate, true));
            });
            updateHeaderSummary();
            scrollOrdersToBottom();
        }

        function getOrderIdFromDropdownKey(key) {
            const match = String(key || '').match(/^order-(.+?)-/);
            return match ? match[1] : '';
        }

        function refreshDropdownCards(...keys) {
            const ids = new Set(keys.map(getOrderIdFromDropdownKey).filter(Boolean));
            if (!ids.size) {
                renderKeepScroll();
                return;
            }
            ids.forEach(id => scheduleOrderCardRefresh(id));
        }

        function refreshOrderAfterFieldChange(orderId, field, oldPhone = '') {
            if (field === 'phone') {
                const ids = new Set([String(orderId)]);
                const nextOrder = appState.orders.find(o => String(o.id) === String(orderId));
                const newPhone = String(nextOrder?.phone || '').trim();
                appState.orders.forEach(o => {
                    const phone = String(o.phone || '').trim();
                    if ((oldPhone && phone === oldPhone) || (newPhone && phone === newPhone)) {
                        ids.add(String(o.id));
                    }
                });
                ids.forEach(id => scheduleOrderCardRefresh(id));
                return;
            }
            scheduleOrderCardRefresh(orderId);
        }

        // 渲染应用
        function render() {
            document.documentElement.setAttribute('data-theme', appState.theme || 'dark');
            const root = document.getElementById('root');
            root.innerHTML = '';
            root.className = 'cc-shell';

            // 查重逻辑
            const phoneCounts = getPhoneCounts();

            // Header
            const header = document.createElement('header');
            header.className = 'cc-header sticky top-0 z-50';
            header.innerHTML = `
                <div class="px-4 h-14 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="cc-logo">✦</div>
                        <div>
                            <h1 class="cc-title text-sm font-semibold">订单助手</h1>
                            <p id="order-count-label" class="cc-subtitle text-xs">${appState.orders.length > 0 ? `${appState.orders.length} 个订单` : 'rules-engine / exact-match'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleTheme()" class="cc-chip text-sm" title="切换日夜模式">
                            ${appState.theme === 'dark' ? '夜间模式' : '白天模式'}
                        </button>
                        ${appState.orders.length > 0 ? `
                            <button onclick="clearAllOrders()" class="cc-chip cc-chip-danger text-sm">
                                清空列表
                            </button>
                            <button onclick="exportToExcel()" class="cc-chip cc-chip-primary text-sm">
                                下载表格
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            // Content
            const content = document.createElement('div');
            content.id = 'orders-scroll';
            content.className = 'flex-1 overflow-y-auto';
            content.style.height = 'calc(100vh - 56px - 120px)';

            const contentInner = document.createElement('div');
            contentInner.className = 'max-w-[1800px] mx-auto px-4 py-6';

            if (appState.orders.length === 0) {
                contentInner.appendChild(WelcomeScreen());
            } else {
                const grid = document.createElement('div');
                grid.id = 'orders-grid';
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-4';
                appState.orders.forEach((order, index) => {
                    const isDuplicate = order.phone && phoneCounts[String(order.phone).trim()] > 1;
                    grid.appendChild(OrderCard(order, index, appState.globalOptions, updateOrder, confirmDeleteOrder, isDuplicate));
                });
                contentInner.appendChild(grid);
            }

            content.appendChild(contentInner);

            // Input
            const inputSection = document.createElement('div');
            inputSection.className = 'cc-input-area sticky bottom-0';
            inputSection.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-4">
                    <div class="cc-composer flex items-center gap-3 p-2">
                        <div class="flex-1 relative">
                            <textarea
                                id="input-textarea"
                                placeholder="粘贴订单文本，自动识别..."
                                class="w-full min-h-[44px] max-h-[200px] resize-none border-0 px-3 py-[11px] text-[14px] focus:outline-none"
                                ${appState.isProcessing ? 'disabled' : ''}
                                rows="1"
                            >${appState.inputText}</textarea>
                        </div>
                        <button
                            id="submit-btn"
                            ${!appState.inputText.trim() || appState.isProcessing ? 'disabled' : ''}
                            class="cc-send h-[42px] px-4 min-w-[62px] flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ${appState.isProcessing ? '<div class="loader" style="width: 18px; height: 18px;"></div>' : '发送 ↵'}
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-center">
                        粘贴自动识别 · Enter 发送 · Shift + Enter 换行
                    </p>
                </div>
            `;

            root.appendChild(header);
            root.appendChild(content);
            root.appendChild(inputSection);

            // 事件监听
            const textarea = document.getElementById('input-textarea');
            const submitBtn = document.getElementById('submit-btn');

            textarea.addEventListener('input', (e) => {
                appState.inputText = e.target.value;
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
                submitBtn.disabled = !appState.inputText.trim() || appState.isProcessing;
            });

            textarea.addEventListener('paste', (e) => {
                const pastedText = e.clipboardData.getData('text');
                if (pastedText.trim()) {
                    e.preventDefault();
                    handleSubmitText(pastedText);
                }
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (appState.inputText.trim() && !appState.isProcessing) {
                        handleSubmitText(appState.inputText);
                    }
                }
            });

            submitBtn.addEventListener('click', () => {
                if (appState.inputText.trim() && !appState.isProcessing) {
                    handleSubmitText(appState.inputText);
                }
            });

            document.querySelectorAll('.note-textarea').forEach(autoResizeNote);
        }

        // 初始化
        let mouseFrame = null;
        let latestMouseEvent = null;
        document.addEventListener('pointermove', (e) => {
            latestMouseEvent = e;
            if (mouseFrame) return;
            mouseFrame = requestAnimationFrame(() => {
                if (latestMouseEvent) {
                    document.body.style.setProperty('--mouse-x', `${latestMouseEvent.clientX}px`);
                    document.body.style.setProperty('--mouse-y', `${latestMouseEvent.clientY}px`);
                }
                mouseFrame = null;
            });
        });

        document.addEventListener('click', () => {
            if (appState.openDropdown) {
                const previousKey = appState.openDropdown;
                appState.openDropdown = '';
                refreshDropdownCards(previousKey);
            }
        });
        fetchOptions();
        render();
    </script>
</body>

</html>
