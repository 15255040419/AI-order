<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手 AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 动态渐变文字 */
        .animated-gradient-text {
            background: linear-gradient(90deg,
                    #3b82f6 0%,
                    #8b5cf6 25%,
                    #ec4899 50%,
                    #8b5cf6 75%,
                    #3b82f6 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 10s linear infinite;
        }

        @keyframes gradient-flow {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        textarea {
            line-height: 22px;
        }

        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast 样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* 选择框样式 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        /* 动画效果 */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-animate {
            animation: fadeInScale 0.2s ease-out;
        }

        /* Modal 样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.2s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-root"></div>

    <script>
        const BACKEND_BASE_URL = 'http://127.0.0.1:5000/api';

        // Toast 通知
        const toast = {
            success: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast success';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            },
            error: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast error';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            }
        };

        // 确认对话框
        function showConfirmDialog(title, description, onConfirm) {
            const modalRoot = document.getElementById('modal-root');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">${title}</h3>
                    <p style="color: #6b7280; margin-bottom: 24px;">${description}</p>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="cancel-btn" style="padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: white; cursor: pointer;">取消</button>
                        <button id="confirm-btn" style="padding: 8px 16px; border: none; border-radius: 6px; background: #3b82f6; color: white; cursor: pointer;">确认</button>
                    </div>
                </div>
            `;
            modalRoot.appendChild(modal);

            modal.querySelector('#cancel-btn').onclick = () => modal.remove();
            modal.querySelector('#confirm-btn').onclick = () => {
                onConfirm();
                modal.remove();
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        // SVG 图标
        const icons = {
            sparkles: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364-.707-.707M6.343 6.343l-.707-.707m12.728 0-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/></svg>`,
            send: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: translate(-1px, 1px);"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`,
            download: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`,
            trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            trashSmall: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            chevronDown: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            chevronUp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            package: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg>`,
            loader: `<svg class="loader-icon" width="32" height="32" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>`
        };

        // 主应用状态
        let appState = {
            orders: [],
            globalOptions: {
                salesmen: [],
                customers: [],
                payMethods: [],
                receipts: [],
                expressOptions: [],
                allProducts: [],
            },
            isProcessing: false,
            inputText: '',
            mousePosition: { x: 0, y: 0 }
        };

        // 动画角色组件
        function AnimatedCharacters() {
            const container = document.createElement('div');
            container.style.cssText = 'position: relative; width: 480px; height: 360px; margin: 0 auto; perspective: 1000px;';

            // 紫色矩形角色
            const purple = document.createElement('div');
            purple.className = 'character-purple';
            purple.style.cssText = 'position: absolute; bottom: 0; left: 60px; width: 170px; height: 370px; background: #6c3ff5; border-radius: 10px 10px 0 0; z-index: 1; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            purple.innerHTML = `
                <div style="position: absolute; left: 45px; top: 40px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 黑色矩形角色
            const black = document.createElement('div');
            black.className = 'character-black';
            black.style.cssText = 'position: absolute; bottom: 0; left: 220px; width: 115px; height: 290px; background: #2d2d2d; border-radius: 8px 8px 0 0; z-index: 2; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            black.innerHTML = `
                <div style="position: absolute; left: 26px; top: 32px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 橙色半圆角色
            const orange = document.createElement('div');
            orange.className = 'character-orange';
            orange.style.cssText = 'position: absolute; bottom: 0; left: 0; width: 230px; height: 190px; background: #ff9b6b; border-radius: 115px 115px 0 0; z-index: 3; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            orange.innerHTML = `
                <div style="position: absolute; left: 82px; top: 90px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
            `;

            // 黄色圆角色
            const yellow = document.createElement('div');
            yellow.className = 'character-yellow';
            yellow.style.cssText = 'position: absolute; bottom: 0; left: 290px; width: 135px; height: 215px; background: #e8d754; border-radius: 68px 68px 0 0; z-index: 4; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            yellow.innerHTML = `
                <div style="position: absolute; left: 52px; top: 40px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
                <div style="position: absolute; left: 40px; top: 88px; width: 50px; height: 4px; background: #2d2d2d; border-radius: 2px; transition: all 0.7s ease-in-out;"></div>
            `;

            container.appendChild(purple);
            container.appendChild(black);
            container.appendChild(orange);
            container.appendChild(yellow);

            // 鼠标跟随动画
            window.addEventListener('mousemove', (e) => {
                const characters = [purple, black, orange, yellow];
                characters.forEach((char) => {
                    const rect = char.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 3;
                    const dx = e.clientX - cx;
                    const dy = e.clientY - cy;
                    const faceX = Math.max(-15, Math.min(15, dx / 20));
                    const faceY = Math.max(-10, Math.min(10, dy / 30));
                    const bodySkew = Math.max(-6, Math.min(6, -dx / 120));

                    char.style.transform = `skewX(${bodySkew}deg)`;

                    const faceContainer = char.querySelector('div[style*="transition"]');
                    if (faceContainer) {
                        const baseLeft = char === purple ? 45 : char === black ? 26 : char === orange ? 82 : 52;
                        const baseTop = char === purple ? 40 : char === black ? 32 : char === orange ? 90 : 40;
                        faceContainer.style.left = `${baseLeft + faceX}px`;
                        faceContainer.style.top = `${baseTop + faceY}px`;
                    }

                    // 眼珠跟随
                    const pupils = char.querySelectorAll('.pupil');
                    pupils.forEach((pupil) => {
                        const pupilRect = pupil.getBoundingClientRect();
                        const pcx = pupilRect.left + pupilRect.width / 2;
                        const pcy = pupilRect.top + pupilRect.height / 2;
                        const pdx = e.clientX - pcx;
                        const pdy = e.clientY - pcy;
                        const maxDist = char === purple ? 4 : char === black ? 3.5 : 8;
                        const dist = Math.min(Math.sqrt(pdx * pdx + pdy * pdy), maxDist);
                        const angle = Math.atan2(pdy, pdx);
                        pupil.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                    });
                });
            });

            return container;
        }

        // 欢迎屏幕
        function WelcomeScreen() {
            const container = document.createElement('div');
            container.className = 'flex flex-col items-center justify-center px-4';
            container.style.minHeight = 'calc(100vh - 200px)';

            const charactersDiv = document.createElement('div');
            charactersDiv.style.marginBottom = '2rem';
            charactersDiv.appendChild(AnimatedCharacters());

            const textDiv = document.createElement('p');
            textDiv.className = 'text-center max-w-md text-lg font-bold animated-gradient-text';
            textDiv.style.lineHeight = '1.75';
            textDiv.textContent = '粘贴订单文本,AI 自动识别收货信息、货品明细，助您快速完成订单录入';

            container.appendChild(charactersDiv);
            container.appendChild(textDiv);

            return container;
        }

        // 订单卡片
        function OrderCard(order, index, globalOptions, onUpdate, onDelete) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow card-animate';
            card.style.height = 'fit-content';

            if (order.loading) {
                card.innerHTML = `
                    <div class="p-8 flex flex-col items-center justify-center">
                        <div class="loader mb-3"></div>
                        <span class="text-sm text-gray-600">AI 正在识别...</span>
                    </div>
                `;
                return card;
            }

            if (order.error) {
                card.className = 'bg-red-50 rounded-xl border border-red-200 p-6 card-animate';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-base font-semibold text-red-900">解析失败</h3>
                        <button onclick="deleteOrder(${order.id})" class="text-red-600 hover:text-red-800">${icons.trashSmall}</button>
                    </div>
                    <p class="text-sm text-red-600">${order.errType || '无法解析订单'}</p>
                `;
                return card;
            }

            // Header
            const header = document.createElement('div');
            header.className = 'px-4 py-3 border-b border-gray-100 bg-gradient-to-r from-blue-50 to-purple-50 flex items-center justify-between';
            header.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-xs font-extrabold text-blue-500 bg-blue-100/50 px-2 py-0.5 rounded-full">#${index + 1}</span>
                    <h3 class="font-bold text-gray-900 text-sm">
                        ${order.receiver || '未命名订单'}
                    </h3>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-base font-bold text-blue-600">¥${order.total || 0}</span>
                    <button onclick="confirmDeleteOrder(${order.id})" class="h-8 w-8 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-full flex items-center justify-center transition-all">
                        ${icons.trashSmall}
                    </button>
                </div>
            `;

            // Content
            const content = document.createElement('div');
            content.className = 'p-4 space-y-4';
            content.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">收货人</label>
                        <input type="text" value="${order.receiver || ''}" onchange="updateOrder(${order.id}, 'receiver', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">手机号</label>
                        <input type="text" value="${order.phone || ''}" onchange="updateOrder(${order.id}, 'phone', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">应收合计</label>
                        <input type="number" value="${order.total || 0}" onchange="updateOrder(${order.id}, 'total', parseFloat(this.value))" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-bold text-blue-600 bg-white" />
                    </div>
                    <div class="space-y-1 col-span-2">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">收货地址</label>
                        <input type="text" value="${order.address || ''}" onchange="updateOrder(${order.id}, 'address', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">应收邮资</label>
                        <input type="number" value="${order.freight || 0}" onchange="updateOrder(${order.id}, 'freight', parseFloat(this.value))" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">客户账号</label>
                        <select onchange="updateCustomerLink(${order.id}, this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50/50">
                            <option value="">未关联</option>
                            ${order.customer_candidates && order.customer_candidates.length > 0 ? `
                                <optgroup label="✨ 智能匹配候选">
                                    ${order.customer_candidates.map(c => `<option value="${c.客户账号}" ${order.account === c.客户账号 ? 'selected' : ''}>${c.客户账号} (${c.客户名称})</option>`).join('')}
                                </optgroup>
                            ` : ''}
                            ${globalOptions.customers && globalOptions.customers.length > 0 ? `
                                <optgroup label="👥 所有客户">
                                    ${globalOptions.customers.map(c => `<option value="${c.客户账号}" ${order.account === c.客户账号 ? 'selected' : ''}>${c.客户名称}</option>`).join('')}
                                </optgroup>
                            ` : ''}
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">业务员</label>
                        <select onchange="updateOrder(${order.id}, 'salesman', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50/50">
                            <option value="">选择业务员</option>
                            ${globalOptions.salesmen.map(s => `<option value="${s}" ${order.salesman === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">收款账户</label>
                        <select onchange="updateOrder(${order.id}, 'receipt', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50/50">
                            <option value="">选择账户</option>
                            ${globalOptions.receipts.map(r => `<option value="${r}" ${order.receipt === r ? 'selected' : ''}>${r}</option>`).join('')}
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">快递</label>
                        <select onchange="updateOrder(${order.id}, 'express', this.value)" class="w-full h-8 text-sm px-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-blue-50/50 font-bold text-gray-700">
                            <option value="">自动识别中...</option>
                            ${(globalOptions.expressOptions || ['顺丰速运', '圆通（渠道）', '中通（渠道）', '申通快递', '韵达快递', '邮政EMS', '德邦特惠', '极兔渠道（新）', '工厂代发', '工厂直发']).map(e => `<option value="${e}" ${order.express === e ? 'selected' : ''}>${e}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs text-gray-600">客服备注</label>
                    <input type="text" value="${order.note || ''}" onchange="updateOrder(${order.id}, 'note', this.value)" placeholder="添加备注信息..." class="w-full h-9 text-sm px-3 py-2 border border-amber-200 bg-amber-50 rounded-md focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
                </div>
                ${order.products && order.products.length > 0 ? `
                    <div class="space-y-2">
                        <button onclick="toggleProducts(${order.id})" class="w-full flex items-center justify-between h-9 px-3 hover:bg-blue-50 rounded-md transition-colors">
                            <div class="flex items-center gap-2">
                                ${icons.package}
                                <span class="text-xs font-medium text-gray-700">货品清单 (${order.products.length} 件)</span>
                            </div>
                            <span id="chevron-${order.id}">${icons.chevronDown}</span>
                        </button>
                        <div id="products-${order.id}" style="display: none;" class="rounded-lg border border-gray-200 overflow-x-auto custom-scrollbar">
                            <table class="min-w-[700px] w-full text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-1/4">货品名称</th>
                                        <th class="px-2 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-28">货品编号</th>
                                        <th class="px-2 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-28">条码</th>
                                        <th class="px-2 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-28">规格</th>
                                        <th class="px-2 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-20">数量</th>
                                        <th class="px-2 py-2 text-left text-[11px] font-bold text-gray-400 uppercase w-24">价格</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${order.products.map((p, idx) => `
                                        <tr class="border-t border-gray-100 hover:bg-gray-50/50 transition-colors">
                                            <td class="px-3 py-2">
                                                <select onchange="updateProduct(${order.id}, ${idx}, 'matchedName', this.value)" class="w-full text-xs px-2 py-1.5 border border-gray-200 rounded-md focus:outline-none focus:border-blue-500 bg-white">
                                                    <option value="">-- 请选择 --</option>
                                                    ${p.candidates && p.candidates.length > 0 ? `
                                                        <optgroup label="✨ 智能匹配候选">
                                                            ${p.candidates.map(c => `<option value="${c}" ${p.matchedName === c ? 'selected' : ''}>${c}</option>`).join('')}
                                                        </optgroup>
                                                    ` : ''}
                                                    ${globalOptions.allProducts && globalOptions.allProducts.length > 0 ? `
                                                        <optgroup label="📦 所有货品">
                                                            ${globalOptions.allProducts.map(pn => `<option value="${pn}" ${p.matchedName === pn ? 'selected' : ''}>${pn}</option>`).join('')}
                                                        </optgroup>
                                                    ` : ''}
                                                </select>
                                            </td>
                                            <td class="px-2 py-2 text-xs text-gray-500 font-medium">${p.productInfo?.['货品编号'] || '—'}</td>
                                            <td class="px-2 py-2 text-xs text-gray-400 font-mono">${p.productInfo?.['条码'] || '—'}</td>
                                            <td class="px-2 py-2 text-xs text-gray-500">${p.productInfo?.['规格'] || '—'}</td>
                                            <td class="px-2 py-2">
                                                <input type="number" value="${p.qty}" onchange="updateProduct(${order.id}, ${idx}, 'qty', parseInt(this.value))" class="w-full h-8 text-xs border border-gray-200 rounded-md focus:outline-none focus:border-blue-500 text-center" />
                                            </td>
                                            <td class="px-2 py-2">
                                                <input type="number" value="${p.price || 0}" onchange="updateProduct(${order.id}, ${idx}, 'price', parseFloat(this.value))" class="w-full h-8 text-xs border border-gray-200 rounded-md focus:outline-none focus:border-blue-500 text-center font-bold text-blue-600" />
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                ` : ''}
            `;

            card.appendChild(header);
            card.appendChild(content);

            return card;
        }

        // --- 全局交互函数 ---
        
        window.updateCustomerLink = async (orderId, matchedAccountCode) => {
            const order = appState.orders.find(o => o.id === orderId);
            if (!order) return;

            // 如果原本识别出的账号不等于新选的账号，则触发学习
            if (order.account && order.account !== matchedAccountCode) {
                console.log(`🧠 系统正在同步学习客户关联: ${order.account} -> ${matchedAccountCode}`);
                try {
                    await fetch(`${BACKEND_BASE_URL}/learn`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'customer',
                            rawName: order.account, 
                            matchedName: matchedAccountCode
                        })
                    });
                } catch (e) {
                    console.error('学习同步失败:', e);
                }
            }
            updateOrder(orderId, 'account', matchedAccountCode);
        };

        window.updateOrder = (id, field, value) => {
            appState.orders = appState.orders.map(o =>
                o.id === id ? { ...o, [field]: value } : o
            );
        };

        window.updateProduct = (orderId, productIndex, field, value) => {
            const order = appState.orders.find(o => o.id === orderId);
            if (!order) return;

            const products = [...order.products];
            const p = products[productIndex];
            const oldMatch = p.matchedName;
            const searchName = p.name || p.searchName; 

            products[productIndex] = { ...p, [field]: value };

            if (field === 'matchedName') {
                if (appState.globalOptions.allProductsData) {
                    const info = appState.globalOptions.allProductsData.find(s => s['货品名称'] === value);
                    if (info) products[productIndex].productInfo = info;
                }
                
                if (value && value !== oldMatch && searchName) {
                    learnCorrection('product', searchName, value);
                }
            }

            appState.orders = appState.orders.map(o => o.id === orderId ? { ...o, products } : o);
            render();
        };

        async function learnCorrection(type, rawName, matchedName) {
            try {
                await fetch(`${BACKEND_BASE_URL}/learn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, rawName, matchedName })
                });
                console.log(`💡 系统进步 [${type}]：记录了 ${rawName} -> ${matchedName}`);
                fetchOptions();
            } catch (e) { console.error('Learning Failed', e); }
        }

        window.confirmDeleteOrder = (id) => {
            showConfirmDialog(
                '确认删除此订单？',
                '删除后无法恢复，请确认是否继续。',
                () => {
                    appState.orders = appState.orders.filter(o => o.id !== id);
                    render();
                    toast.success('订单已删除');
                }
            );
        };

        window.toggleProducts = (orderId) => {
            const productsDiv = document.getElementById(`products-${orderId}`);
            const chevron = document.getElementById(`chevron-${orderId}`);
            if (productsDiv.style.display === 'none') {
                productsDiv.style.display = 'block';
                chevron.innerHTML = icons.chevronUp;
            } else {
                productsDiv.style.display = 'none';
                chevron.innerHTML = icons.chevronDown;
            }
        };

        // 获取配置
        async function fetchOptions() {
            try {
                const res = await fetch(`${BACKEND_BASE_URL}/options`);
                if (res.ok) {
                    appState.globalOptions = await res.json();
                }
            } catch (e) {
                console.error('Options Failed', e);
                toast.error('无法连接到后端服务', '请确保后端已启动在 http://127.0.0.1:5000');
            }
        }

        // 提交订单文本
        async function handleSubmitText(text) {
            if (!text.trim() || appState.isProcessing) return;

            appState.isProcessing = true;
            render();

            let chunks = text.split(/\n\s*\n/).map(t => t.trim()).filter(t => t.length > 5);
            if (chunks.length === 0) chunks = [text];

            const newOrders = chunks.map(chunk => ({
                id: Date.now() + Math.random(),
                raw: chunk,
                receiver: '',
                products: [],
                loading: true,
                error: false,
                errType: '',
                phone: '',
                address: '',
                total: 0,
                freight: 0,
                account: '',
                salesman: appState.globalOptions.salesmen[0] || '',
                receipt: appState.globalOptions.receipts[0] || '',
                express: '',
                note: '',
            }));

            appState.orders = [...appState.orders, ...newOrders];
            render();

            for (let i = 0; i < chunks.length; i++) {
                const chunk = chunks[i];
                const orderIndex = appState.orders.length - chunks.length + i;

                try {
                    const resp = await fetch(`${BACKEND_BASE_URL}/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: chunk }),
                    });

                    if (resp.ok) {
                        const parsed = await resp.json();
                        appState.orders[orderIndex] = {
                            ...appState.orders[orderIndex],
                            ...parsed,
                            id: appState.orders[orderIndex].id,
                            raw: chunk,
                            loading: false,
                        };
                        render();
                    } else {
                        throw new Error(`HTTP ${resp.status}`);
                    }
                } catch (e) {
                    appState.orders[orderIndex] = {
                        ...appState.orders[orderIndex],
                        error: true,
                        receiver: '解析失败',
                        loading: false,
                        errType: e.message,
                    };
                    render();
                }
            }

            appState.isProcessing = false;
            appState.inputText = '';
            render();
        }

        // 导出Excel
        function exportToExcel() {
            if (appState.orders.length === 0) {
                toast.error('没有订单可以导出');
                return;
            }

            const wb = XLSX.utils.book_new();
            const orderRows = [['导入编号', '收货人', '手机', '收货地址', '收货人信息(解析)', '应收邮资', '应收合计', '客服备注', '客户账号', '销售渠道名称', '结算方式', '物流公司', '收款账户', '业务员']];
            const prodRows = [['导入编号(关联订单)', '货品名称', '条码', '货品编号', '规格', '数量', '单价']];

            appState.orders.forEach((r, idx) => {
                const importId = idx + 1;
                orderRows.push([
                    importId, r.receiver, r.phone, r.address,
                    `${r.receiver} ${r.phone} ${r.address}`,
                    r.freight || 0, r.total || 0, r.note || '',
                    r.account || '', r.salesChannel || '仝心科技线下批发',
                    r.payMethod || '欠款计应收', r.express || '',
                    r.receipt || '', r.salesman || ''
                ]);
                (r.products || []).forEach(p => {
                    prodRows.push([
                        importId,
                        p.matchedName || p.searchName,
                        p.productInfo?.['条码'] || '',
                        p.productInfo?.['货品编号'] || '',
                        p.productInfo?.['规格'] || '',
                        p.qty, p.price
                    ]);
                });
            });

            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orderRows), '订单');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prodRows), '货品');
            XLSX.writeFile(wb, `订单分表_${new Date().toLocaleDateString()}.xlsx`);

            toast.success('订单已导出为Excel文件');
        }

        // 清空所有订单
        function clearAllOrders() {
            showConfirmDialog(
                '确认清空所有订单？',
                '此操作将删除所有已识别的订单，且无法撤销。请确保已导出重要数据。',
                () => {
                    appState.orders = [];
                    render();
                    toast.success('已清空所有订单');
                }
            );
        }

        // 渲染应用
        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';

            // Header
            const header = document.createElement('header');
            header.className = 'border-b border-gray-200 bg-white/80 backdrop-blur-lg sticky top-0 z-50';
            header.innerHTML = `
                <div class="px-4 h-14 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center text-white">
                            ${icons.sparkles}
                        </div>
                        <div>
                            <h1 class="text-sm font-semibold text-gray-900">订单助手 AI</h1>
                            ${appState.orders.length > 0 ? `<p class="text-xs text-gray-500">${appState.orders.length} 个订单</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${appState.orders.length > 0 ? `
                            <button onclick="clearAllOrders()" class="h-8 px-3 text-sm border border-gray-200 rounded bg-gray-50 hover:bg-gray-100 flex items-center gap-1.5">
                                ${icons.trash}
                                清空
                            </button>
                            <button onclick="exportToExcel()" class="h-8 px-3 text-sm rounded text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 flex items-center gap-1.5">
                                ${icons.download}
                                导出
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            // Content
            const content = document.createElement('div');
            content.className = 'flex-1 overflow-y-auto';
            content.style.height = 'calc(100vh - 56px - 120px)';

            const contentInner = document.createElement('div');
            contentInner.className = 'max-w-[1800px] mx-auto px-4 py-6';

            if (appState.orders.length === 0) {
                contentInner.appendChild(WelcomeScreen());
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-4';
                appState.orders.forEach((order, index) => {
                    grid.appendChild(OrderCard(order, index, appState.globalOptions, updateOrder, confirmDeleteOrder));
                });
                contentInner.appendChild(grid);
            }

            content.appendChild(contentInner);

            // Input
            const inputSection = document.createElement('div');
            inputSection.className = 'border-t border-gray-200 bg-white sticky bottom-0';
            inputSection.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-4">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 relative">
                            <textarea
                                id="input-textarea"
                                placeholder="粘贴订单文本，自动识别..."
                                class="w-full min-h-[52px] max-h-[200px] resize-none rounded-2xl border border-gray-300 px-4 py-[15px] text-[15px] focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                ${appState.isProcessing ? 'disabled' : ''}
                                rows="1"
                            >${appState.inputText}</textarea>
                        </div>
                        <button
                            id="submit-btn"
                            ${!appState.inputText.trim() || appState.isProcessing ? 'disabled' : ''}
                            class="h-[52px] w-[52px] rounded-full flex items-center justify-center text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ${appState.isProcessing ? '<div class="loader" style="width: 20px; height: 20px; border-width: 2px;"></div>' : icons.send}
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-center">
                        粘贴自动识别 · Enter 发送 · Shift + Enter 换行
                    </p>
                </div>
            `;

            root.appendChild(header);
            root.appendChild(content);
            root.appendChild(inputSection);

            // 事件监听
            const textarea = document.getElementById('input-textarea');
            const submitBtn = document.getElementById('submit-btn');

            textarea.addEventListener('input', (e) => {
                appState.inputText = e.target.value;
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
                submitBtn.disabled = !appState.inputText.trim() || appState.isProcessing;
            });

            textarea.addEventListener('paste', (e) => {
                const pastedText = e.clipboardData.getData('text');
                if (pastedText.trim()) {
                    e.preventDefault();
                    handleSubmitText(pastedText);
                }
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (appState.inputText.trim() && !appState.isProcessing) {
                        handleSubmitText(appState.inputText);
                    }
                }
            });

            submitBtn.addEventListener('click', () => {
                if (appState.inputText.trim() && !appState.isProcessing) {
                    handleSubmitText(appState.inputText);
                }
            });
        }

        // 初始化
        fetchOptions();
        render();
    </script>
</body>

</html>
