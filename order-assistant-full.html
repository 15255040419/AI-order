<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手 AI版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/css/liquid-glass.css">
</head>

<body>
    <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;left:-9999px;top:-9999px;">
        <filter id="liquid-glass-refraction">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="7" result="noise" />
            <feGaussianBlur in="noise" stdDeviation="1.8" result="softNoise" />
            <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>
    <canvas id="particleCanvas"></canvas>
    <div id="root"></div>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-root"></div>

    <script src="assets/js/core.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/interactions.js"></script>
    <script src="assets/js/api-orders.js"></script>
    <script src="assets/js/export.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/boot.js"></script>
</body>

</html>
