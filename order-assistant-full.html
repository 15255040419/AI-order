<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手 AI版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 隐藏滚动条但保留滚动功能 */
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }

        *::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
        }

        /* 动态渐变文字 */
        .animated-gradient-text {
            background: linear-gradient(90deg,
                    #3b82f6 0%,
                    #8b5cf6 25%,
                    #ec4899 50%,
                    #8b5cf6 75%,
                    #3b82f6 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 10s linear infinite;
        }

        @keyframes gradient-flow {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        textarea {
            line-height: 22px;
        }

        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast 样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* 选择框样式 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        /* 动画效果 */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-animate {
            animation: fadeInScale 0.2s ease-out;
        }

        /* Modal 样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.2s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 🌟 新增：呼吸灯红色渐变动画 (用于查重) */
        @keyframes breathing-red {
            0% {
                border-color: #ef4444;
                box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
            }

            50% {
                border-color: #dc2626;
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 10px rgba(239, 68, 68, 0.2);
            }

            100% {
                border-color: #ef4444;
                box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
            }
        }

        .duplicate-highlight {
            animation: breathing-red 2s infinite ease-in-out !important;
            border-width: 2px !important;
            background-color: #fff1f2 !important;
            /* 浅淡红背景辅助辨识 */
        }

        /* 🌟 新增：规则实验室弹窗样式 */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        .settings-panel {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 16px;
            display: flex;
            flex-child: column;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .settings-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
        }

        .settings-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .settings-footer {
            padding: 16px 24px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #f8fafc;
        }

        .config-section {
            margin-bottom: 32px;
        }

        .config-title {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rule-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rule-card input {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-root"></div>
    <div id="settings-root"></div>

    <script>
        // 🌟 动态适配后端地址 (支持局域网 IP 访问)
        const BACKEND_BASE_URL = window.location.origin.includes('http')
            ? window.location.origin
            : 'http://127.0.0.1:5000';

        // --- 拖拽功能助手 ---
        function makeDraggable(header, target) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            header.onmousedown = (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
                
                // 🌟 核心修复：点击瞬间锁定当前位置，切换为绝对定位以脱离 Flex 居中限制
                const rect = target.getBoundingClientRect();
                target.style.position = 'absolute';
                target.style.top = rect.top + 'px';
                target.style.left = rect.left + 'px';
                target.style.transform = 'none';
                target.style.margin = '0';
                
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    header.style.cursor = 'grab';
                };
                document.onmousemove = (e) => {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    target.style.top = (target.offsetTop - pos2) + "px";
                    target.style.left = (target.offsetLeft - pos1) + "px";
                };
                header.style.cursor = 'grabbing';
            };
        }

        // Toast 通知
        const toast = {
            success: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast success';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            },
            error: (message, description = '') => {
                const container = document.getElementById('toast-container');
                const toastEl = document.createElement('div');
                toastEl.className = 'toast error';
                toastEl.innerHTML = `
                    <div style="font-weight: 600; color: #111827;">${message}</div>
                    ${description ? `<div style="font-size: 14px; color: #6b7280; margin-top: 4px;">${description}</div>` : ''}
                `;
                container.appendChild(toastEl);
                setTimeout(() => toastEl.remove(), 3000);
            }
        };

        // 确认对话框
        function showConfirmDialog(title, description, onConfirm) {
            const modalRoot = document.getElementById('modal-root');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">${title}</h3>
                    <p style="color: #6b7280; margin-bottom: 24px;">${description}</p>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="cancel-btn" style="padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: white; cursor: pointer;">取消</button>
                        <button id="confirm-btn" style="padding: 8px 16px; border: none; border-radius: 6px; background: #3b82f6; color: white; cursor: pointer;">确认</button>
                    </div>
                </div>
            `;
            modalRoot.appendChild(modal);

            modal.querySelector('#cancel-btn').onclick = () => modal.remove();
            modal.querySelector('#confirm-btn').onclick = () => {
                onConfirm();
                modal.remove();
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        // 🌟 新增：全局模糊匹配工具 (确保下拉框能对上带括号的名字)
        window.findBestMatch = (options, value) => {
            if (!value) return '';
            const clean = (s) => String(s).replace(/[\(\（].*?[\)\）]/g, '').replace(/[\[\]]/g, '').trim().toUpperCase();
            const target = clean(value);
            // 1. 直接匹配
            if (options.includes(value)) return value;
            // 2. 清洁后的精确匹配
            const match = options.find(opt => clean(opt) === target);
            if (match) return match;
            // 3. 包含匹配
            return options.find(opt => clean(opt).includes(target) || target.includes(clean(opt))) || value;
        };

        // SVG 图标
        const icons = {
            sparkles: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364-.707-.707M6.343 6.343l-.707-.707m12.728 0-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/></svg>`,
            send: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: translate(-1px, 1px);"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`,
            download: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`,
            trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            trashSmall: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            chevronDown: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            chevronUp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            package: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg>`,
            search: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
            loader: `<svg class="loader-icon" width="32" height="32" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>`,
            settings: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
            x: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
            edit: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`
        };


        // 主应用状态
        let appState = {
            orders: [],
            globalOptions: {
                salesmen: [],
                customers: [],
                payMethods: [],
                receipts: [],
                expressOptions: [],
                allProducts: [],
            },
            isProcessing: false,
            inputText: '',
            mousePosition: { x: 0, y: 0 }
        };

        // 动画角色组件
        function AnimatedCharacters() {
            const container = document.createElement('div');
            container.style.cssText = 'position: relative; width: 480px; height: 360px; margin: 0 auto; perspective: 1000px;';

            // 紫色矩形角色
            const purple = document.createElement('div');
            purple.className = 'character-purple';
            purple.style.cssText = 'position: absolute; bottom: 0; left: 60px; width: 170px; height: 370px; background: #6c3ff5; border-radius: 10px 10px 0 0; z-index: 1; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            purple.innerHTML = `
                <div style="position: absolute; left: 45px; top: 40px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 18px; height: 18px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 7px; height: 7px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 黑色矩形角色
            const black = document.createElement('div');
            black.className = 'character-black';
            black.style.cssText = 'position: absolute; bottom: 0; left: 220px; width: 115px; height: 290px; background: #2d2d2d; border-radius: 8px 8px 0 0; z-index: 2; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            black.innerHTML = `
                <div style="position: absolute; left: 26px; top: 32px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                    <div class="eye" style="width: 16px; height: 16px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <div class="pupil" style="width: 6px; height: 6px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    </div>
                </div>
            `;

            // 橙色半圆角色
            const orange = document.createElement('div');
            orange.className = 'character-orange';
            orange.style.cssText = 'position: absolute; bottom: 0; left: 0; width: 230px; height: 190px; background: #ff9b6b; border-radius: 115px 115px 0 0; z-index: 3; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            orange.innerHTML = `
                <div style="position: absolute; left: 82px; top: 90px; display: flex; gap: 28px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
            `;

            // 黄色圆角色
            const yellow = document.createElement('div');
            yellow.className = 'character-yellow';
            yellow.style.cssText = 'position: absolute; bottom: 0; left: 290px; width: 135px; height: 215px; background: #e8d754; border-radius: 68px 68px 0 0; z-index: 4; transform-origin: bottom center; transition: transform 0.7s ease-in-out;';
            yellow.innerHTML = `
                <div style="position: absolute; left: 52px; top: 40px; display: flex; gap: 20px; transition: all 0.7s ease-in-out;">
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                    <div class="pupil" style="width: 12px; height: 12px; border-radius: 50%; background: #2d2d2d; transition: transform 0.1s;"></div>
                </div>
                <div style="position: absolute; left: 40px; top: 88px; width: 50px; height: 4px; background: #2d2d2d; border-radius: 2px; transition: all 0.7s ease-in-out;"></div>
            `;

            container.appendChild(purple);
            container.appendChild(black);
            container.appendChild(orange);
            container.appendChild(yellow);

            // 鼠标跟随动画
            window.addEventListener('mousemove', (e) => {
                const characters = [purple, black, orange, yellow];
                characters.forEach((char) => {
                    const rect = char.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 3;
                    const dx = e.clientX - cx;
                    const dy = e.clientY - cy;
                    const faceX = Math.max(-15, Math.min(15, dx / 20));
                    const faceY = Math.max(-10, Math.min(10, dy / 30));
                    const bodySkew = Math.max(-6, Math.min(6, -dx / 120));

                    char.style.transform = `skewX(${bodySkew}deg)`;

                    const faceContainer = char.querySelector('div[style*="transition"]');
                    if (faceContainer) {
                        const baseLeft = char === purple ? 45 : char === black ? 26 : char === orange ? 82 : 52;
                        const baseTop = char === purple ? 40 : char === black ? 32 : char === orange ? 90 : 40;
                        faceContainer.style.left = `${baseLeft + faceX}px`;
                        faceContainer.style.top = `${baseTop + faceY}px`;
                    }

                    // 眼珠跟随
                    const pupils = char.querySelectorAll('.pupil');
                    pupils.forEach((pupil) => {
                        const pupilRect = pupil.getBoundingClientRect();
                        const pcx = pupilRect.left + pupilRect.width / 2;
                        const pcy = pupilRect.top + pupilRect.height / 2;
                        const pdx = e.clientX - pcx;
                        const pdy = e.clientY - pcy;
                        const maxDist = char === purple ? 4 : char === black ? 3.5 : 8;
                        const dist = Math.min(Math.sqrt(pdx * pdx + pdy * pdy), maxDist);
                        const angle = Math.atan2(pdy, pdx);
                        pupil.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                    });
                });
            });

            return container;

        // --- 全局交互函数 ---

        window.updateCustomerLink = async (orderId, matchedAccountCode) => {
            const order = appState.orders.find(o => o.id === orderId);
            if (!order) return;

            // 如果原本识别出的账号不等于新选的账号，则触发学习
            if (order.account && order.account !== matchedAccountCode) {
                console.log(`🧠 系统正在同步学习客户关联: ${order.account} -> ${matchedAccountCode}`);
                try {
                    await fetch(`${BACKEND_BASE_URL}/learn`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'customer',
                            rawName: order.account,
                            matchedName: matchedAccountCode
                        })
                    });
                    toast.success('🧠 系统已自动同步关联', `下次识别 [${order.account}] 将自动匹配为 [${matchedAccountCode}]`);
                } catch (e) {
                    console.error('学习同步失败:', e);
                }
            }
            updateOrder(orderId, 'account', matchedAccountCode);
        };

        window.confirmProductMatch = async (orderId, productIndex) => {
            const order = appState.orders.find(o => o.id === orderId);
            if (!order) return;
            const p = order.products[productIndex];
            if (!p || !p.searchName || !p.matchedName || p.matchedName === '未找到匹配') return;

            // 1. 触发学习逻辑
            await learnCorrection('product', p.searchName, p.matchedName);

            // 2. 更新本地状态，立即变蓝
            p.source = 'special_map';
            p.confidence = 100;
            render();
        };

        window.updateOrder = (id, field, value) => {
            appState.orders = appState.orders.map(o => {
                if (o.id === id) {
                    let newOrder = { ...o, [field]: value };

                    // 🌟 联动A: 结算方式设为欠款 -> 清空收款人
                    if (field === 'payMethod' && value === '欠款计应收') {
                        newOrder.receipt = '';
                    }
                    // 🌟 联动B: 选了/取消收款人
                    if (field === 'receipt') {
                        if (value !== '') {
                            newOrder.payMethod = '银行收款'; // 选了账户 -> 银行收款
                        } else {
                            newOrder.payMethod = '欠款计应收'; // 清空账户 -> 欠款计应收
                        }
                    }

                    if (field === 'freight' || field === 'total') {
                        const prodSum = o.products.reduce((sum, p) => sum + (parseFloat(p.price || 0) * parseInt(p.qty || 1)), 0);
                        if (field === 'freight') {
                            newOrder.total = prodSum + parseFloat(value || 0);
                        }
                    }
                    return newOrder;
                }
                return o;
            });
            render();
        };

        window.updateProduct = (orderId, productIndex, field, value) => {
            appState.orders = appState.orders.map(o => {
                if (o.id === orderId) {
                    const products = [...o.products];
                    const p = { ...products[productIndex], [field]: value };

                    // 1. 同步库存元数据
                    if (field === 'matchedName') {
                        const oldMatch = products[productIndex].matchedName;
                        const searchName = p.name || p.searchName;
                        if (appState.globalOptions.allProductsData) {
                            // 增强：去除空格并转字符串匹配，保障万无一失
                            const info = appState.globalOptions.allProductsData.find(s =>
                                String(s['货品名称']).trim() === String(value).trim()
                            );
                            if (info) p.productInfo = info;
                        }
                        if (value && value !== oldMatch && searchName) {
                            learnCorrection('product', searchName, value);
                        }
                    }

                    products[productIndex] = p;
                    const newOrder = { ...o, products };

                    // 🌟 核心逻辑：如果修改的是价格或数量，则自动更新合计
                    if (field === 'price' || field === 'qty' || field === 'matchedName') {
                        const prodSum = products.reduce((sum, item) => sum + (parseFloat(item.price || 0) * parseInt(item.qty || 1)), 0);
                        newOrder.total = prodSum + parseFloat(o.freight || 0);
                    }

                    return newOrder;
                }
                return o;
            });
            render();
        };

        async function learnCorrection(type, rawName, matchedName) {
            try {
                await fetch(`${BACKEND_BASE_URL}/learn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, rawName, matchedName })
                });
                console.log(`💡 系统进步 [${type}]：记录了 ${rawName} -> ${matchedName}`);
                toast.success('🧠 匹配引擎已自我升级', `型号 [${rawName}] 以后将自动纠错为 [${matchedName}]`);
                fetchOptions();
            } catch (e) { console.error('Learning Failed', e); }
        }

            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 600px; height: 500px; display: flex; flex-direction: column; position: relative;">

        // 提交订单文本 (分步流式/异步流水线模式)
        async function handleSubmitText(text) {
            const rawText = text.trim();
            if (!rawText) return;

            appState.inputText = '';

            let chunks = rawText.split(/\n\s*\n/).map(t => t.trim()).filter(t => t.length > 5);
            if (chunks.length === 0) chunks = [rawText];

            const newOrders = chunks.map(chunk => ({
                id: Date.now() + Math.random(),
                raw: chunk,
                receiver: '等待解析...',
                products: [],
                loading: true,
                error: false,
                errType: '',
                phone: '',
                address: '',
                total: 0,
                freight: 0,
                account: '',
                salesman: appState.globalOptions.salesmen[0] || '',
                receipt: appState.globalOptions.receipts[0] || '',
                express: '',
                express_reason: '',
                note: '',
            }));

            // 1. 追加占位符
            appState.orders = [...appState.orders, ...newOrders];
            render();

            // 2. 串行流式处理 (逐个解析，获得流水线效果)
            for (let i = 0; i < newOrders.length; i++) {
                const placeholder = newOrders[i];
                try {
                    const resp = await fetch(`${BACKEND_BASE_URL}/api/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: placeholder.raw }),
                    });

                    if (resp.ok) {
                        const parsed = await resp.json();
                        appState.orders = appState.orders.map(o =>
                            o.id === placeholder.id ? { ...o, ...parsed, loading: false } : o
                        );
                    } else {
                        throw new Error(`HTTP ${resp.status}`);
                    }
                } catch (e) {
                    appState.orders = appState.orders.map(o =>
                        o.id === placeholder.id ? { ...o, error: true, receiver: '解析失败', loading: false, errType: e.message } : o
                    );
                } finally {
                    render(); // 解析完一个显示一个
                }
            }
            toast.success(`解析完成，共 ${chunks.length} 条订单`);
        }

        // 下载Excel
        function exportToExcel() {
            if (appState.orders.length === 0) {
                toast.error('没有订单可以下载');
                return;
            }

            const wb = XLSX.utils.book_new();
            const orderRows = [['导入编号', '收货人', '手机', '收货地址', '收货人信息(解析)', '应收邮资', '应收合计', '客服备注', '客户账号', '销售渠道名称', '结算方式', '物流公司', '收款账户', '业务员']];
            const prodRows = [['导入编号(关联订单)', '货品名称', '条码', '货品编号', '规格', '数量', '单价']];

            appState.orders.forEach((r, idx) => {
                const importId = r.phone || (idx + 1); // 🌟 优先使用手机号作为导入编号
                orderRows.push([
                    importId, r.receiver, r.phone, r.address,
                    `${r.receiver} ${r.phone} ${r.address}`,
                    r.freight || 0, r.total || 0, r.note || '',
                    r.account || '', r.salesChannel || '仝心科技线下批发',
                    r.payMethod || '欠款计应收', r.express || '',
                    r.receipt || '', r.salesman || ''
                ]);

                // 🌟 核心修复：将货品信息添加到货品表中
                if (r.products && r.products.length > 0) {
                    r.products.forEach(p => {
                        prodRows.push([
                            importId, // 关联订单的编号
                            p.matchedName || p.searchName,
                            p.productInfo?.['条码'] || '',
                            p.productInfo?.['货品编号'] || '',
                            p.productInfo?.['规格'] || '',
                            p.qty || 1,
                            p.price || 0
                        ]);
                    });
                }
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orderRows), '订单');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prodRows), '货品');
            XLSX.writeFile(wb, `订单_${Date.now()}.xlsx`);
        }

                                <div class="config-title">👥 客户账号映射 (手动关联记录)</div>
                                <div id="customer-map-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                                    ${Object.entries(currentConfig['客户特殊映射'] || {}).map(([key, val]) => `
                                        <div class="rule-card" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px; background: white;">
                                            <span style="font-size: 11px; color: #64748b; width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${key}">${key}</span>
                                            <span style="color: #94a3b8;">→</span>
                                            <select onchange="updateConfig('客户特殊映射.${key}', this.value)" style="flex: 1; min-width: 0; padding: 4px; font-size: 12px; border-radius: 4px; border: 1px solid #e2e8f0;">
                                                <option value="">-- 选择正式账号 --</option>
                                                <option value="${val}" selected>${val}</option>
                                                ${(appState.globalOptions.customers || []).slice(0, 200).map(c => `<option value="${c.客户账号}">${c.客户名称} (${c.客户账号})</option>`).join('')}
                                            </select>
                                            <button onclick="deleteConfigKey('客户特殊映射', '${key}')" style="color: #ef4444; background: none; border: none; cursor: pointer; padding: 4px;">${icons.trashSmall}</button>
                                        </div>
                                    `).slice(0, 60).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="settings-footer">
                            <button onclick="toggleSettings()" style="padding: 10px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 600; cursor: pointer;">取消</button>
                            <button onclick="saveConfig()" style="padding: 10px 24px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: 700; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);">保存所有规则</button>
                        </div>
                    </div>
                </div>
            `;
            
            const panel = root.querySelector('.settings-panel');
            const header = root.querySelector('.settings-header');
            makeDraggable(header, panel);

            // 辅助功能
            window.addNewMap = (section, inputId, defaultVal) => {
                const key = document.getElementById(inputId).value.trim();
                if(!key) return toast.error('请输入代码或关键词');
                if(!currentConfig[section]) currentConfig[section] = {};
                currentConfig[section][key] = defaultVal;
                renderSettings();
            };
            
            window.renameConfigKey = (section, oldKey, newKey) => {
                if(oldKey === newKey) return;
                const val = currentConfig[section][oldKey];
                delete currentConfig[section][oldKey];
                currentConfig[section][newKey] = val;
                renderSettings();
            };
        }

        function updateConfig(path, value) {
            const keys = path.split('.');
            let current = currentConfig;
            for (let i = 0; i < keys.length - 1; i++) {
                current = current[keys[i]];
            }
            current[keys[keys.length - 1]] = value;
        }

        function deleteConfigKey(section, key) {
            delete currentConfig[section][key];
            renderSettings();
        }

        async function saveConfig() {
            try {
                const res = await fetch(`${BACKEND_BASE_URL}/api/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentConfig)
                });
                if (res.ok) {
                    toast.success('配置已生效！');
                    toggleSettings();
                    fetchOptions();
                }
            } catch (e) {
                toast.error('保存失败');
            }
        }

        // 渲染应用
        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';

            // 查重逻辑
            const phoneCounts = {};
            appState.orders.forEach(o => {
                const p = String(o.phone || '').trim();
                if (p) phoneCounts[p] = (phoneCounts[p] || 0) + 1;
            });

            // Header
            const header = document.createElement('header');
            header.className = 'border-b border-gray-200 bg-white/80 backdrop-blur-lg sticky top-0 z-50';
            header.innerHTML = `
                <div class="px-4 h-14 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center text-white">
                            ${icons.sparkles}
                        </div>
                        <div>
                            <h1 class="text-sm font-semibold text-gray-900">订单助手 AI版</h1>
                            ${appState.orders.length > 0 ? `<p class="text-xs text-gray-500">${appState.orders.length} 个订单</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleSettings()" class="h-8 w-8 flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all" title="规则实验室">
                            ${icons.settings}
                        </button>
                        ${appState.orders.length > 0 ? `
                            <button onclick="clearAllOrders()" class="h-8 px-3 text-sm border border-gray-200 rounded bg-gray-50 hover:bg-gray-100 flex items-center gap-1.5">
                                ${icons.trash}
                                清空
                            </button>
                            <button onclick="exportToExcel()" class="h-8 px-3 text-sm rounded text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 flex items-center gap-1.5">
                                ${icons.download}
                                下载
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            // Content
            const content = document.createElement('div');
            content.className = 'flex-1 overflow-y-auto';
            content.style.height = 'calc(100vh - 56px - 120px)';

            const contentInner = document.createElement('div');
            contentInner.className = 'max-w-[1800px] mx-auto px-4 py-6';

            if (appState.orders.length === 0) {
                contentInner.appendChild(WelcomeScreen());
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-4';
                appState.orders.forEach((order, index) => {
                    const isDuplicate = order.phone && phoneCounts[String(order.phone).trim()] > 1;
                    grid.appendChild(OrderCard(order, index, appState.globalOptions, updateOrder, confirmDeleteOrder, isDuplicate));
                });
                contentInner.appendChild(grid);
            }

            content.appendChild(contentInner);

            // Input
            const inputSection = document.createElement('div');
            inputSection.className = 'border-t border-gray-200 bg-white sticky bottom-0';
            inputSection.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-4">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 relative">
                            <textarea
                                id="input-textarea"
                                placeholder="粘贴订单文本，自动识别..."
                                class="w-full min-h-[52px] max-h-[200px] resize-none rounded-2xl border border-gray-300 px-4 py-[15px] text-[15px] focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                ${appState.isProcessing ? 'disabled' : ''}
                                rows="1"
                            >${appState.inputText}</textarea>
                        </div>
                        <button
                            id="submit-btn"
                            ${!appState.inputText.trim() || appState.isProcessing ? 'disabled' : ''}
                            class="h-[52px] w-[52px] rounded-full flex items-center justify-center text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ${appState.isProcessing ? '<div class="loader" style="width: 20px; height: 20px; border-width: 2px;"></div>' : icons.send}
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-center">
                        粘贴自动识别 · Enter 发送 · Shift + Enter 换行
                    </p>
                </div>
            `;

            root.appendChild(header);
            root.appendChild(content);
            root.appendChild(inputSection);

            // 事件监听
            const textarea = document.getElementById('input-textarea');
            const submitBtn = document.getElementById('submit-btn');

            textarea.addEventListener('input', (e) => {
                appState.inputText = e.target.value;
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
                submitBtn.disabled = !appState.inputText.trim() || appState.isProcessing;
            });

            textarea.addEventListener('paste', (e) => {
                const pastedText = e.clipboardData.getData('text');
                if (pastedText.trim()) {
                    e.preventDefault();
                    handleSubmitText(pastedText);
                }
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (appState.inputText.trim() && !appState.isProcessing) {
                        handleSubmitText(appState.inputText);
                    }
                }
            });

            submitBtn.addEventListener('click', () => {
                if (appState.inputText.trim() && !appState.isProcessing) {
                    handleSubmitText(appState.inputText);
                }
            });
        }

        // 初始化
        fetchOptions();
        render();
    </script>
</body>

</html>
